<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>世界和平會 x 保生國小 x GC 夢想閱章 - 老師目管理系統</title>
    <style>
        :root { --primary: #27ae60; --secondary: #3498db; --bg: #f4f7f6; --text: #2c3e50; --accent: #f39c12; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        .page { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
        .page.active { display: block; }

        /* 1. 成就看板 */
        .achievement-header { background: linear-gradient(135deg, #1b4d3e, #27ae60); color: white; border-radius: 15px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .achievement-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; text-align: center; margin-top: 15px; }
        .ach-item b { font-size: 24px; display: block; }
        .ach-item span { font-size: 11px; opacity: 0.8; }

        /* 2. 學生列表卡片 (總覽強化) */
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 6px solid #ddd; position: relative; }
        .card.goal-met { border-left-color: var(--accent); }
        
        .student-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .wish-info { background: #fff8e1; color: var(--accent); padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        
        /* 總覽進度顯示區 */
        .progress-stats-overview { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 15px 0; background: #fffcf5; padding: 10px; border-radius: 8px; border: 1px solid #ffecb3; }
        .prog-item { text-align: center; }
        .prog-item label { font-size: 10px; color: #888; display: block; }
        .prog-item b { font-size: 14px; color: var(--text); }
        .prog-item small { font-size: 10px; color: #999; }

        /* 快速紀錄區 */
        .record-grid { display: grid; grid-template-columns: 60px 1fr 1fr 1fr 1fr; gap: 8px; align-items: end; background: #f9f9f9; padding: 12px; border-radius: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 10px; color: #777; }
        .input-wrapper { display: flex; align-items: center; gap: 3px; }
        .input-wrapper input { width: 35px; padding: 4px; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-size: 12px; }
        .plus-btn { padding: 4px 6px; background: white; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-confirm { background: var(--primary); color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }

        /* 詳細頁面與目標設定 */
        .detail-header { background: white; padding: 25px; border-radius: 15px; border-top: 6px solid var(--secondary); margin-bottom: 20px; }
        .setting-section { background: #eef7ff; padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 10px; }
        .form-grid input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 5px; }

        .history-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        .history-table th { background: #f8f9fa; padding: 10px; text-align: left; }
        .history-table td { padding: 10px; border-bottom: 1px solid #eee; }

        /* 全局按鈕 */
        .fixed-footer { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; z-index: 100; }
        .btn-batch { width: 100%; padding: 15px; background: var(--secondary); color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .text-link { color: var(--secondary); cursor: pointer; text-decoration: underline; font-size: 13px; font-weight: bold; }
    </style>
</head>
<body>

<div id="page-overview" class="page active">
    <div class="achievement-header">
        <h2 style="margin:0;">保生國小：年度教學成效總覽</h2>
        <div class="achievement-grid">
            <div class="ach-item"><b>1,095</b><span>累積天數</span></div>
            <div class="ach-item"><b>342</b><span>總時數(h)</span></div>
            <div class="ach-item"><b id="total-met">0</b><span>達標人數</span></div>
            <div class="ach-item"><b>25</b><span>陪伴人數</span></div>
        </div>
    </div>

    <div id="student-list"></div>
</div>

<div id="page-detail" class="page">
    <button onclick="showPage('page-overview')" style="margin-bottom:20px; cursor:pointer; background:none; border:1px solid #ddd; padding:5px 10px; border-radius:5px;">⬅ 返回總覽</button>
    
    <div class="detail-header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="det-name">學生姓名</h2>
            <div id="det-wish" class="wish-info">🎁 心願禮物</div>
        </div>
        <p id="det-goal" style="color:#666; font-size:14px; margin-top:10px;">目標：未設定</p>

        <div class="setting-section">
            <h4 style="margin:0 0 10px 0;">⚙️ 個別化目標設定</h4>
            <div class="form-grid">
                <div class="input-group"><label>出席次數目標</label><input type="number" id="set-t-att"></div>
                <div class="input-group"><label>發表次數目標</label><input type="number" id="set-t-speech"></div>
                <div class="input-group"><label>提問次數目標</label><input type="number" id="set-t-ask"></div>
            </div>
            <button onclick="saveTargets()" style="margin-top:15px; background:var(--primary); color:white; border:none; padding:8px 20px; border-radius:5px; cursor:pointer; width:100%; font-weight:bold;">更新考核契約</button>
        </div>
    </div>

    <div class="card">
        <h3>📅 歷史紀錄與編修</h3>
        <table class="history-table">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>發表</th>
                    <th>提問</th>
                    <th>結構%</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="history-body"></tbody>
        </table>
    </div>
</div>

<div class="fixed-footer">
    <button class="btn-batch" onclick="batchUpload()">📸 一鍵上傳全班作品照片 </button>
</div>

<script>
    // 初始數據：包含個別不同的目標值
    let students = [
        { id: 1, name: "林小洵", wish: "專業球鞋", goal: "克服上台發言的勇氣", att: 42, speech: 35, ask: 12, struct: 65, 
          target: { att: 45, speech: 50, ask: 20 }, hasNewWork: false, logs: [
            { date: "2026/04/07", speech: 3, ask: 1, struct: 70 },
            { date: "2026/03/31", speech: 2, ask: 0, struct: 65 }
        ]},
        { id: 2, name: "陳小黑", wish: "迷你烤箱", goal: "提升寫作邏輯完整度", att: 48, speech: 62, ask: 25, struct: 85, 
          target: { att: 50, speech: 60, ask: 30 }, hasNewWork: false, logs: [
            { date: "2026/04/07", speech: 5, ask: 2, struct: 85 }
        ]}
    ];

    function renderOverview() {
        const list = document.getElementById('student-list');
        list.innerHTML = students.map(s => {
            const isReady = (s.att >= s.target.att && s.speech >= s.target.speech && s.ask >= s.target.ask);
            return `
                <div class="card ${isReady ? 'goal-met' : ''}">
                    <div class="student-header">
                        <div>
                            <span style="font-size:18px; font-weight:bold;">${s.name}</span>
                            <span class="text-link" onclick="viewDetail(${s.id})" style="margin-left:10px;">學生細項</span>
                        </div>
                        <div class="wish-info">🎁 心願：${s.wish}</div>
                    </div>
                    <div style="font-size:12px; color:#666; margin-bottom:5px;"><b>目標：</b>${s.goal}</div>
                    
                    <div class="progress-stats-overview">
                        <div class="prog-item">
                            <label>出席進度</label>
                            <b>${s.att}</b> <small>/ ${s.target.att}</small>
                        </div>
                        <div class="prog-item">
                            <label>發表進度</label>
                            <b>${s.speech}</b> <small>/ ${s.target.speech}</small>
                        </div>
                        <div class="prog-item">
                            <label>提問進度</label>
                            <b>${s.ask}</b> <small>/ ${s.target.ask}</small>
                        </div>
                    </div>

                    <div class="record-grid">
                        <div class="input-group"><label>出席</label><input type="checkbox" checked style="width:18px; height:18px;"></div>
                        <div class="input-group">
                            <label>發表</label>
                            <div class="input-wrapper"><input type="number" id="sp-${s.id}" value="0"><button class="plus-btn" onclick="add(${s.id},'sp')">+1</button></div>
                        </div>
                        <div class="input-group">
                            <label>提問</label>
                            <div class="input-wrapper"><input type="number" id="as-${s.id}" value="0"><button class="plus-btn" onclick="add(${s.id},'as')">+1</button></div>
                        </div>
                        <div class="input-group">
                            <label>結構%</label>
                            <div class="input-wrapper"><input type="number" id="st-${s.id}" placeholder="%" style="width:45px;"><button class="btn-confirm" onclick="save(${s.id})">確定</button></div>
                        </div>
                    </div>
                    ${s.hasNewWork ? `<div style="font-size:11px; color:var(--primary); font-weight:bold; margin-top:8px;">✅ 今日作品已自動歸檔</div>` : ''}
                </div>
            `;
        }).join('');
        document.getElementById('total-met').innerText = students.filter(s => (s.att >= s.target.att && s.speech >= s.target.speech && s.ask >= s.target.ask)).length;
    }

    function add(id, type) { 
        const el = document.getElementById(`${type}-${id}`);
        el.value = parseInt(el.value) + 1;
    }

    function save(id) {
        const s = students.find(x => x.id === id);
        const sp = parseInt(document.getElementById(`sp-${id}`).value);
        const ask = parseInt(document.getElementById(`as-${id}`).value);
        const st = document.getElementById(`st-${id}`).value;

        s.speech += sp;
        s.ask += ask;
        if(st) s.struct = parseInt(st);
        s.logs.unshift({ date: "2026/04/07", speech: sp, ask: ask, struct: st || s.struct });
        
        document.getElementById(`sp-${id}`).value = 0;
        document.getElementById(`as-${id}`).value = 0;
        renderOverview();
    }

    let currentId = null;
    function viewDetail(id) {
        currentId = id;
        const s = students.find(x => x.id === id);
        showPage('page-detail');
        document.getElementById('det-name').innerText = s.name + " 的成長細項";
        document.getElementById('det-wish').innerText = "🎁 心願禮物：" + s.wish;
        document.getElementById('det-goal').innerText = "核心目標：" + s.goal;

        // 填充設定框
        document.getElementById('set-t-att').value = s.target.att;
        document.getElementById('set-t-speech').value = s.target.speech;
        document.getElementById('set-t-ask').value = s.target.ask;
        
        const body = document.getElementById('history-body');
        body.innerHTML = s.logs.map((l, i) => `
            <tr>
                <td>${l.date}</td>
                <td>${l.speech}</td>
                <td>${l.ask}</td>
                <td>${l.struct}%</td>
                <td style="color:var(--secondary); cursor:pointer;">編修</td>
            </tr>
        `).join('');
    }

    function saveTargets() {
        const s = students.find(x => x.id === currentId);
        s.target.att = parseInt(document.getElementById('set-t-att').value);
        s.target.speech = parseInt(document.getElementById('set-t-speech').value);
        s.target.ask = parseInt(document.getElementById('set-t-ask').value);
        renderOverview();
        alert("考核目標已針對該學員更新完成。");
    }

    function batchUpload() {
        alert("系統自動分類中...");
        setTimeout(() => {
            students.forEach(s => s.hasNewWork = true);
            renderOverview();
            alert("全班作品已自動歸檔！");
        }, 800);
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    renderOverview();
</script>
</body>
</html>
