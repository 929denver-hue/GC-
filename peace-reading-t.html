<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GC夢想閱章 - 老師端管理系統 (含個人詳細紀錄)</title>
    <style>
        :root { --primary: #27ae60; --secondary: #3498db; --bg: #f0f2f5; --text: #2c3e50; }
        body { font-family: "PingFang TC", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .hidden { display: none; }

        /* 頂部導航 */
        .top-nav { background: white; padding: 15px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .back-btn { background: none; border: 1px solid #ddd; padding: 5px 10px; border-radius: 5px; cursor: pointer; margin-right: 15px; }

        /* 卡片樣式 */
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h3 { margin-top: 0; border-left: 4px solid var(--primary); padding-left: 10px; }

        /* 數據網格 */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; text-align: center; }
        .stat-item b { display: block; font-size: 20px; color: var(--primary); }
        .stat-item span { font-size: 11px; color: #888; }

        /* 歷史列表表格 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
        th { background: #f8f9fa; text-align: left; padding: 10px; border-bottom: 2px solid #eee; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        .status-pill { padding: 2px 8px; border-radius: 10px; font-size: 11px; color: white; }
        .bg-green { background: var(--primary); }

        /* 句子結構 % 進度條 */
        .struct-bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; width: 60px; }
        .struct-fill { height: 100%; background: var(--secondary); }

        /* 列表按鈕 */
        .view-detail-btn { background: var(--secondary); color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div id="view-class" class="container">
    <div class="card">
        <h2 style="margin:0;">保生國小：寫作班級管理</h2>
        <p style="color:#666; font-size:14px;">點擊「查看個人紀錄」追蹤孩子三年的長線成長</p>
    </div>

    <div id="class-list">
        </div>
</div>

<div id="view-detail" class="hidden">
    <div class="top-nav">
        <button class="back-btn" onclick="showClassView()">⬅ 返回列表</button>
        <h2 id="detail-name" style="margin:0;">學童成長紀錄</h2>
    </div>

    <div class="container">
        <div class="card">
            <h3>長期成長總覽 (跨年度累積)</h3>
            <div class="stats-grid">
                <div class="stat-item"><b id="det-att">0</b><span>累積出席</span></div>
                <div class="stat-item"><b id="det-hours">0</b><span>上課總時數</span></div>
                <div class="stat-item"><b id="det-works">0</b><span>作品總件數</span></div>
                <div class="stat-item"><b id="det-wish">90%</b><span>夢想達成率</span></div>
            </div>
            <div style="margin-top:20px; padding:15px; background:#fff8e1; border-radius:8px;">
                <div style="font-size:13px; color:#e67e22; font-weight:bold;">年度心願契約：【專業球鞋】</div>
                <div style="font-size:12px; color:#666;">解鎖條件：累計發表達 50 次，目前已完成 42 次 (84%)</div>
            </div>
        </div>

        <div class="card">
            <h3>單次課堂紀錄明細 (時間軸)</h3>
            <table>
                <thead>
                    <tr>
                        <th>日期/週次</th>
                        <th>出席</th>
                        <th>發表/提問</th>
                        <th>結構%</th>
                        <th>作品紀錄</th>
                    </tr>
                </thead>
                <tbody id="detail-history">
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // 模擬後端數據：包含三年累積摘要與每一堂課的歷史
    const students = [
        { 
            id: 1, name: "林小明", wish: "專業球鞋", attCount: 45, hours: 90, works: 12, 
            history: [
                { date: "2026/04/07 (W12)", status: "出席", speech: 3, ask: 1, struct: 65, workThumb: "📸 已歸檔" },
                { date: "2026/03/31 (W11)", status: "出席", speech: 2, ask: 0, struct: 60, workThumb: "📸 已歸檔" },
                { date: "2026/03/24 (W10)", status: "出席", speech: 4, ask: 2, struct: 55, workThumb: "📸 已歸檔" }
            ]
        },
        { 
            id: 2, name: "陳阿花", wish: "迷你烤箱", attCount: 48, hours: 96, works: 20, 
            history: [
                { date: "2026/04/07 (W12)", status: "出席", speech: 5, ask: 2, struct: 85, workThumb: "📸 已歸檔" },
                { date: "2026/03/31 (W11)", status: "出席", speech: 4, ask: 1, struct: 80, workThumb: "📸 已歸檔" }
            ]
        }
    ];

    function renderClassList() {
        const list = document.getElementById('class-list');
        list.innerHTML = students.map(s => `
            <div class="card" style="border-left: 5px solid var(--primary);">
                <button class="view-detail-btn" onclick="showDetailView(${s.id})">查看個人紀錄</button>
                <div style="font-weight:bold; font-size:18px;">${s.name}</div>
                <div style="font-size:12px; color:#666; margin:5px 0;">年度心願：${s.wish}</div>
                <div style="display:flex; gap:15px; font-size:11px; margin-top:10px;">
                    <span>📍 累積出席：${s.attCount}次</span>
                    <span>📍 作品總數：${s.works}件</span>
                </div>
            </div>
        `).join('');
    }

    function showDetailView(id) {
        const s = students.find(x => x.id === id);
        document.getElementById('view-class').classList.add('hidden');
        document.getElementById('view-detail').classList.remove('hidden');
        
        // 填充詳細紀錄
        document.getElementById('detail-name').innerText = `${s.name} 的成長存摺`;
        document.getElementById('det-att').innerText = s.attCount;
        document.getElementById('det-hours').innerText = s.hours;
        document.getElementById('det-works').innerText = s.works;

        const historyBody = document.getElementById('detail-history');
        historyBody.innerHTML = s.history.map(h => `
            <tr>
                <td>${h.date}</td>
                <td><span class="status-pill bg-green">${h.status}</span></td>
                <td>說:${h.speech} / 問:${h.ask}</td>
                <td>
                    <div class="struct-bar"><div class="struct-fill" style="width:${h.struct}%"></div></div>
                    <span style="font-size:10px; color:#888;">${h.struct}%</span>
                </td>
                <td style="color:var(--secondary); cursor:pointer;">${h.workThumb}</td>
            </tr>
        `).join('');
    }

    function showClassView() {
        document.getElementById('view-detail').classList.add('hidden');
        document.getElementById('view-class').classList.remove('hidden');
    }

    // 初始化
    renderClassList();
</script>

</body>
</html>
