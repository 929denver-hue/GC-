<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GC夢想閱章 - 老師端全功能管理系統</title>
    <style>
        :root { --primary: #27ae60; --secondary: #3498db; --bg: #f4f7f6; --text: #2c3e50; --accent: #f39c12; }
        body { font-family: "PingFang TC", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        .page { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
        .page.active { display: block; }

        /* 1. 老師年度成就看板 */
        .achievement-header { background: linear-gradient(135deg, #1b4d3e, #27ae60); color: white; border-radius: 15px; padding: 25px; margin-bottom: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .achievement-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; text-align: center; margin-top: 15px; }
        .ach-item b { font-size: 24px; display: block; }
        .ach-item span { font-size: 11px; opacity: 0.8; }

        /* 2. 學生列表卡片 (總覽) */
        .card { background: white; border-radius: 15px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border-left: 6px solid #ddd; position: relative; }
        .card.goal-met { border-left-color: var(--accent); }
        .wish-info { background: #fff8e1; color: var(--accent); padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; }
        
        /* 快速紀錄區 */
        .record-grid { display: grid; grid-template-columns: 60px 1fr 1fr 1.2fr; gap: 8px; align-items: end; background: #f9f9f9; padding: 12px; border-radius: 10px; margin-top: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 4px; }
        .input-group label { font-size: 10px; color: #777; }
        .input-wrapper { display: flex; align-items: center; gap: 3px; }
        .input-wrapper input { width: 35px; padding: 4px; border: 1px solid #ddd; border-radius: 4px; text-align: center; font-size: 12px; }
        .plus-btn { padding: 4px 6px; background: white; border: 1px solid #ddd; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .btn-confirm { background: var(--primary); color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }

        /* 作品狀態與進度 */
        .work-status { font-size: 11px; margin-top: 10px; color: var(--primary); font-weight: bold; }
        .bar-bg { background: #eee; height: 6px; border-radius: 3px; overflow: hidden; margin: 8px 0; }
        .bar-fill { background: var(--primary); height: 100%; transition: width 0.5s; }

        /* 詳細頁面樣式 */
        .detail-header { background: white; padding: 20px; border-radius: 15px; border-top: 6px solid var(--secondary); margin-bottom: 20px; }
        .history-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        .history-table th { background: #f8f9fa; padding: 10px; text-align: left; }
        .history-table td { padding: 10px; border-bottom: 1px solid #eee; }

        /* 全局按鈕 */
        .fixed-footer { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 600px; z-index: 100; }
        .btn-batch { width: 100%; padding: 15px; background: var(--secondary); color: white; border: none; border-radius: 30px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div id="page-overview" class="page active">
    <div class="achievement-header">
        <h2 style="margin:0;">保生國小：年度教學成效總覽</h2>
        <div class="achievement-grid">
            <div class="ach-item"><b>1,095</b><span>累積天數</span></div>
            <div class="ach-item"><b>342</b><span>總時數(h)</span></div>
            <div class="ach-item"><b id="total-met">0</b><span>達標人數</span></div>
            <div class="ach-item"><b>25</b><span>陪伴人數</span></div>
        </div>
    </div>

    <div id="student-list"></div>
</div>

<div id="page-detail" class="page">
    <button onclick="showPage('page-overview')" style="margin-bottom:20px; cursor:pointer; background:none; border:1px solid #ddd; padding:5px 10px; border-radius:5px;">⬅ 返回總覽</button>
    
    <div class="detail-header">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 id="det-name">學童姓名</h2>
            <button onclick="editGoal()" style="background:none; border:1px solid var(--secondary); color:var(--secondary); padding:5px 12px; border-radius:15px; cursor:pointer; font-size:12px;">⚙️ 設定目標/心願</button>
        </div>
        <div id="det-goal" style="color:#666; font-size:14px; margin: 10px 0;">目標：克服上台恐懼</div>
        <div id="det-wish" class="wish-info">🎁 心願：專業球鞋</div>
    </div>

    <div class="card">
        <h3>📅 歷史紀錄與編修</h3>
        <table class="history-table">
            <thead>
                <tr>
                    <th>日期</th>
                    <th>發表</th>
                    <th>提問</th>
                    <th>結構%</th>
                    <th>操作</th>
                </tr>
            </thead>
            <tbody id="history-body"></tbody>
        </table>
    </div>
</div>

<div class="fixed-footer">
    <button class="btn-batch" onclick="batchUpload()">📸 一鍵上傳全班作品 (AI 自動分類)</button>
</div>

<script>
    let students = [
        { id: 1, name: "林小明", year: 2, wish: "專業球鞋", goal: "克服上台發言的勇氣", speech: 35, ask: 12, struct: 65, target: 50, hasNewWork: false, logs: [
            { date: "2026/04/07", speech: 3, ask: 1, struct: 70 },
            { date: "2026/03/31", speech: 2, ask: 0, struct: 65 }
        ]},
        { id: 2, name: "陳阿花", year: 3, wish: "迷你烤箱", goal: "提升寫作邏輯完整度", speech: 62, ask: 25, struct: 85, target: 60, hasNewWork: false, logs: [
            { date: "2026/04/07", speech: 5, ask: 2, struct: 85 }
        ]}
    ];

    function renderOverview() {
        const list = document.getElementById('student-list');
        list.innerHTML = students.map(s => {
            const isMet = s.speech >= s.target;
            const progress = Math.min((s.speech / s.target) * 100, 100);
            return `
                <div class="card ${isMet ? 'goal-met' : ''}">
                    <div class="student-header">
                        <div>
                            <span style="font-size:18px; font-weight:bold; cursor:pointer; color:var(--secondary);" onclick="viewDetail(${s.id})">${s.name} 🔍</span>
                            <span style="font-size:11px; color:#888; margin-left:8px;">第 ${s.year} 年</span>
                        </div>
                        <div class="wish-info">🎁 ${s.wish}</div>
                    </div>
                    <div style="font-size:13px; color:#666; margin-bottom:5px;">目標：${s.goal}</div>
                    <div class="bar-bg"><div class="bar-fill" style="width:${progress}%"></div></div>

                    <div class="record-grid">
                        <div class="input-group"><label>出席</label><input type="checkbox" checked style="width:18px; height:18px;"></div>
                        <div class="input-group">
                            <label>發表</label>
                            <div class="input-wrapper"><input type="number" id="sp-${s.id}" value="0"><button class="plus-btn" onclick="add(${s.id},'sp')">+1</button></div>
                        </div>
                        <div class="input-group">
                            <label>提問</label>
                            <div class="input-wrapper"><input type="number" id="as-${s.id}" value="0"><button class="plus-btn" onclick="add(${s.id},'as')">+1</button></div>
                        </div>
                        <div class="input-group">
                            <label>結構%</label>
                            <div class="input-wrapper"><input type="number" id="st-${s.id}" placeholder="%" style="width:50px;"><button class="btn-confirm" onclick="save(${s.id})">確定</button></div>
                        </div>
                    </div>
                    ${s.hasNewWork ? `<div class="work-status">✅ 今日作品已 AI 分類並歸檔</div>` : ''}
                </div>
            `;
        }).join('');
        document.getElementById('total-met').innerText = students.filter(x => x.speech >= x.target).length;
    }

    function add(id, type) { 
        const el = document.getElementById(`${type}-${id}`);
        el.value = parseInt(el.value) + 1;
    }

    function save(id) {
        const s = students.find(x => x.id === id);
        const sp = parseInt(document.getElementById(`sp-${id}`).value);
        const ask = parseInt(document.getElementById(`as-${id}`).value);
        const st = document.getElementById(`st-${id}`).value;

        s.speech += sp;
        s.ask += ask;
        // 存入單次歷史
        s.logs.unshift({ date: "2026/04/07", speech: sp, ask: ask, struct: st || s.struct });
        
        document.getElementById(`sp-${id}`).value = 0;
        document.getElementById(`as-${id}`).value = 0;
        renderOverview();
        alert(`${s.name} 本日紀錄已存入個人歷史空間。`);
    }

    let currentId = null;
    function viewDetail(id) {
        currentId = id;
        const s = students.find(x => x.id === id);
        showPage('page-detail');
        document.getElementById('det-name').innerText = s.name + " 的成長存摺";
        document.getElementById('det-goal').innerText = "學習目標：" + s.goal;
        document.getElementById('det-wish').innerText = "🎁 心願禮物：" + s.wish;
        
        const body = document.getElementById('history-body');
        body.innerHTML = s.logs.map((l, i) => `
            <tr>
                <td>${l.date}</td>
                <td>${l.speech}</td>
                <td>${l.ask}</td>
                <td>${l.struct}%</td>
                <td style="color:var(--secondary); cursor:pointer;" onclick="editLog(${i})">編修</td>
            </tr>
        `).join('');
    }

    function editGoal() {
        const s = students.find(x => x.id === currentId);
        const g = prompt("設定新的學習目標：", s.goal);
        const w = prompt("設定新的心願禮物：", s.wish);
        if(g) s.goal = g;
        if(w) s.wish = w;
        viewDetail(currentId);
        renderOverview();
    }

    function batchUpload() {
        alert("AI 自動分類中...");
        setTimeout(() => {
            students.forEach(s => s.hasNewWork = true);
            renderOverview();
            alert("全班作品已自動撥入個人作品集！");
        }, 1000);
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    renderOverview();
</script>
</body>
</html>
