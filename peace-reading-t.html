<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GC夢想閱章 - 契約與考核管理系統</title>
    <style>
        :root { --primary: #27ae60; --secondary: #3498db; --bg: #f5f7f9; --text: #2c3e50; --accent: #e67e22; --danger: #e74c3c; }
        body { font-family: "PingFang TC", sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; }
        
        .page { display: none; padding: 20px; max-width: 900px; margin: 0 auto; }
        .page.active { display: block; }

        /* 契約卡片 */
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .goal-tag { background: #fff3e0; color: var(--accent); padding: 4px 12px; border-radius: 5px; font-size: 13px; font-weight: bold; margin-bottom: 10px; display: inline-block; }

        /* 考核追蹤表格 */
        .target-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .target-table th { text-align: left; font-size: 12px; color: #888; padding: 8px; border-bottom: 1px solid #eee; }
        .target-table td { padding: 12px 8px; border-bottom: 1px solid #eee; font-size: 14px; }
        
        .status-badge { padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
        .status-ok { background: #e8f5e9; color: var(--primary); }
        .status-wait { background: #fff3e0; color: var(--accent); }

        /* 獎勵領取區 */
        .reward-banner { padding: 15px; border-radius: 10px; text-align: center; font-weight: bold; margin-top: 20px; }
        .reward-locked { background: #f8f9fa; color: #999; border: 1px dashed #ccc; }
        .reward-ready { background: linear-gradient(135deg, #f39c12, #e67e22); color: white; box-shadow: 0 4px 10px rgba(230,126,34,0.3); animation: pulse 2s infinite; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.02); } 100% { transform: scale(1); } }

        /* 表單樣式 */
        .modal { background: white; border-radius: 15px; padding: 25px; border: 1px solid #ddd; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 13px; margin-bottom: 5px; color: #666; }
        .form-group input { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 5px; }

        .btn-detail { background: var(--secondary); color: white; border: none; padding: 8px 15px; border-radius: 20px; cursor: pointer; float: right; }
    </style>
</head>
<body>

<div id="page-class" class="page active">
    <div class="card" style="background: var(--primary); color: white;">
        <h2 style="margin:0;">保生國小：夢想契約進度追蹤</h2>
        <p style="opacity: 0.9; font-size: 14px;">老師可點擊「設定考核」為不同孩子量身打造達標門檻</p>
    </div>

    <div id="student-list">
        </div>
</div>

<div id="page-detail" class="page">
    <div onclick="showPage('page-class')" style="margin-bottom:20px; cursor:pointer; color:var(--secondary);">⬅ 返回班級列表</div>
    
    <div class="card">
        <h2 id="det-name">學生姓名</h2>
        <div class="goal-tag" id="det-goal-text">年度目標：未設定</div>
        
        <h3>🏆 考核達標進度</h3>
        <table class="target-table">
            <thead>
                <tr>
                    <th>考核項目</th>
                    <th>考核目標</th>
                    <th>目前數據</th>
                    <th>狀態</th>
                </tr>
            </thead>
            <tbody id="target-body">
                </tbody>
        </table>

        <div id="reward-status" class="reward-banner reward-locked">
            🔒 尚未達成所有考核指標
        </div>
    </div>

    <div class="card modal">
        <h3>⚙️ 個別化契約與考核設定</h3>
        <div class="form-group">
            <label>年度心願禮物</label>
            <input type="text" id="edit-wish">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div class="form-group"><label>目標出席次數</label><input type="number" id="t-att"></div>
            <div class="form-group"><label>目標發表次數</label><input type="number" id="t-speech"></div>
            <div class="form-group"><label>目標作品件數</label><input type="number" id="t-works"></div>
            <div class="form-group"><label>目標結構完整度 (%)</label><input type="number" id="t-struct"></div>
        </div>
        <button onclick="saveContract()" style="width:100%; padding:12px; background:var(--primary); color:white; border:none; border-radius:8px; cursor:pointer; font-weight:bold;">更新並儲存契約</button>
    </div>
</div>

<script>
    // 學生數據：包含實際數據與考核目標
    let students = [
        { 
            id: 1, name: "林小明", goal: "克服上台恐懼", wish: "專業球鞋", 
            actual: { att: 42, speech: 35, works: 8, struct: 65 },
            target: { att: 45, speech: 50, works: 10, struct: 80 }
        },
        { 
            id: 2, name: "陳阿花", goal: "提升寫作邏輯", wish: "烘焙烤箱", 
            actual: { att: 48, speech: 62, works: 15, struct: 85 },
            target: { att: 45, speech: 40, works: 12, struct: 80 }
        }
    ];

    let currentId = null;

    function renderList() {
        const list = document.getElementById('student-list');
        list.innerHTML = students.map(s => {
            const isDone = checkReady(s);
            return `
                <div class="card" style="border-left: 6px solid ${isDone ? '#f39c12' : '#ddd'}">
                    <button class="btn-detail" onclick="viewDetail(${s.id})">查看與考核</button>
                    <div class="goal-tag">心願：${s.wish}</div>
                    <div style="font-weight:bold; font-size:18px;">${s.name} ${isDone ? '🌟' : ''}</div>
                    <div style="font-size:12px; color:#888; margin-top:5px;">
                        目前的總平均達成率：${calculateOverall(s)}%
                    </div>
                </div>
            `;
        }).join('');
    }

    function viewDetail(id) {
        currentId = id;
        const s = students.find(x => x.id === id);
        showPage('page-detail');
        document.getElementById('det-name').innerText = s.name;
        document.getElementById('det-goal-text').innerText = `年度目標：${s.goal} (預計獎勵：${s.wish})`;
        
        // 填寫編輯表單
        document.getElementById('edit-wish').value = s.wish;
        document.getElementById('t-att').value = s.target.att;
        document.getElementById('t-speech').value = s.target.speech;
        document.getElementById('t-works').value = s.target.works;
        document.getElementById('t-struct').value = s.target.struct;

        renderTargetTable(s);
    }

    function renderTargetTable(s) {
        const metrics = [
            { label: "累積出席", key: "att", unit: "次" },
            { label: "發表/提問", key: "speech", unit: "次" },
            { label: "作品累積", key: "works", unit: "件" },
            { label: "句子結構", key: "struct", unit: "%" }
        ];

        const tbody = document.getElementById('target-body');
        tbody.innerHTML = metrics.map(m => {
            const act = s.actual[m.key];
            const tar = s.target[m.key];
            const ok = act >= tar;
            return `
                <tr>
                    <td>${m.label}</td>
                    <td>${tar}${m.unit}</td>
                    <td style="color:${ok ? '#27ae60' : '#333'}"><b>${act}${m.unit}</b></td>
                    <td><span class="status-badge ${ok ? 'status-ok' : 'status-wait'}">${ok ? '已達標' : '努力中'}</span></td>
                </tr>
            `;
        }).join('');

        const banner = document.getElementById('reward-status');
        if(checkReady(s)) {
            banner.className = "reward-banner reward-ready";
            banner.innerHTML = `✨ 恭喜達成！解鎖獎勵：【${s.wish}】 🎁`;
        } else {
            banner.className = "reward-banner reward-locked";
            banner.innerHTML = `🔒 尚未達成所有指標 (目前總進度 ${calculateOverall(s)}%)`;
        }
    }

    function saveContract() {
        const s = students.find(x => x.id === currentId);
        s.wish = document.getElementById('edit-wish').value;
        s.target.att = parseInt(document.getElementById('t-att').value);
        s.target.speech = parseInt(document.getElementById('t-speech').value);
        s.target.works = parseInt(document.getElementById('t-works').value);
        s.target.struct = parseInt(document.getElementById('t-struct').value);
        
        renderTargetTable(s);
        renderList();
        alert("考核目標已更新！數據將自動對比。");
    }

    function calculateOverall(s) {
        const keys = ['att', 'speech', 'works', 'struct'];
        let totalProgress = 0;
        keys.forEach(k => {
            totalProgress += Math.min((s.actual[k] / s.target[k]) * 100, 100);
        });
        return (totalProgress / 4).toFixed(0);
    }

    function checkReady(s) {
        return s.actual.att >= s.target.att && 
               s.actual.speech >= s.target.speech && 
               s.actual.works >= s.target.works && 
               s.actual.struct >= s.target.struct;
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    renderList();
</script>

</body>
</html>
