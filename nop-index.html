<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPO 資源地圖 | 資源分佈儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto+Sans+TC', sans-serif; background-color: #f8fafc; }
        .active-chip { background-color: #2563eb !important; color: white !important; border-color: #2563eb !important; }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        /* 隱藏捲軸但保有功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="text-slate-800">

    <div id="app" class="max-w-7xl mx-auto px-4 py-6 md:py-10">
        <div class="flex flex-col lg:flex-row gap-6 mb-10">
            <div class="flex-1 bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-[2rem] text-white shadow-xl shadow-blue-100 relative overflow-hidden">
                <div class="relative z-10">
                    <h1 class="text-4xl font-black tracking-tight mb-2">單位服務資源地圖</h1>
                    <p class="opacity-80 text-lg">即時同步雲端數據中心</p>
                    <div class="mt-8 flex items-end gap-4">
                        <div class="bg-white/20 backdrop-blur-md p-4 rounded-2xl">
                            <span class="block text-xs opacity-70 uppercase tracking-widest font-bold">總收錄單位</span>
                            <span id="totalCount" class="text-3xl font-black">--</span>
                        </div>
                    </div>
                </div>
                <div class="absolute -right-10 -bottom-10 w-64 h-64 bg-white/10 rounded-full blur-3xl"></div>
            </div>

            <div class="lg:w-96 bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex flex-col items-center justify-center">
                <h3 class="text-sm font-bold text-slate-400 mb-4 uppercase tracking-widest">資源類別分佈 (%)</h3>
                <div class="w-full h-48 relative">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </div>

        <div class="sticky top-4 z-40 space-y-4 mb-8">
            <div class="relative group">
                <input type="text" id="searchInput" 
                    class="w-full bg-white border-2 border-slate-100 p-5 pl-14 rounded-2xl outline-none focus:border-blue-500 focus:ring-4 focus:ring-blue-50 transition-all text-xl shadow-lg shadow-slate-200/50"
                    placeholder="搜尋名稱、類別、或是詳細說明...">
                <svg class="w-6 h-6 text-slate-300 absolute left-5 top-5 group-focus-within:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
            </div>

            <div id="categoryChips" class="flex overflow-x-auto gap-2 py-2 no-scrollbar">
                </div>
        </div>

        <div id="loader" class="flex justify-center items-center py-24">
            <div class="w-8 h-8 border-4 border-blue-600 border-t-transparent rounded-full animate-spin"></div>
        </div>

        <div id="listContainer" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3"></div>

        <div id="emptyState" class="hidden text-center py-32">
            <div class="text-6xl mb-4">🔎</div>
            <h3 class="text-xl font-bold text-slate-400">沒找到相關單位，換個關鍵字試試？</h3>
        </div>
    </div>

    <script>
        // 註冊插件
        Chart.register(ChartDataLabels);

        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSTGT8qXuH6EljApOaz67UkU6lSWTYF5jTRIFc7NxHw6R5pU-J0o5xW8oHEvB90egZhGBLtJj72BTlE/pub?gid=255315722&single=true&output=csv';
        
        let rawData = [];
        let currentCategory = '全部';
        let chart = null;

        init();

        async function init() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                complete: (results) => {
                    rawData = results.data.filter(d => d['單位全名']);
                    document.getElementById('loader').remove();
                    document.getElementById('totalCount').innerText = rawData.length;
                    
                    renderCategoryChips();
                    renderChart();
                    updateView();
                    setupListeners();
                }
            });
        }

        function renderCategoryChips() {
            const categories = ['全部', ...new Set(rawData.map(item => item['服務類別']).filter(c => c))];
            const container = document.getElementById('categoryChips');
            container.innerHTML = categories.map(cat => `
                <button onclick="setCategory('${cat}')" 
                    class="chip-btn whitespace-nowrap px-6 py-2.5 rounded-xl border border-white bg-white text-sm font-bold text-slate-500 hover:border-blue-200 hover:text-blue-600 transition-all shadow-sm ${cat === '全部' ? 'active-chip' : ''}">
                    ${cat}
                </button>
            `).join('');
        }

        window.setCategory = (cat) => {
            currentCategory = cat;
            document.querySelectorAll('.chip-btn').forEach(btn => {
                btn.classList.toggle('active-chip', btn.innerText === cat);
            });
            updateView();
        };

        function renderChart() {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            const counts = rawData.reduce((acc, cur) => {
                const cat = cur['服務類別'] || '其他';
                acc[cat] = (acc[cat] || 0) + 1;
                return acc;
            }, {});

            const total = rawData.length;

            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(counts),
                    datasets: [{
                        data: Object.values(counts),
                        backgroundColor: ['#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981', '#64748b', '#94a3b8'],
                        borderWidth: 0,
                        hoverOffset: 10
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    cutout: '70%',
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            color: '#fff',
                            font: { weight: 'bold', size: 11 },
                            formatter: (value) => {
                                const percentage = ((value / total) * 100).toFixed(1);
                                return percentage > 3 ? `${percentage}%` : ''; // 佔比太小的就不顯示文字以免重疊
                            }
                        },
                        tooltip: {
                            callbacks: {
                                label: (ctx) => `${ctx.label}: ${((ctx.raw/total)*100).toFixed(1)}% (${ctx.raw}間)`
                            }
                        }
                    },
                    onClick: (e, items) => {
                        if (items.length > 0) setCategory(chart.data.labels[items[0].index]);
                    }
                }
            });
        }

        function updateView() {
            const term = document.getElementById('searchInput').value.toLowerCase();
            const filtered = rawData.filter(item => {
                const mCat = currentCategory === '全部' || item['服務類別'] === currentCategory;
                const mSearch = Object.values(item).some(v => String(v).toLowerCase().includes(term));
                return mCat && mSearch;
            });
            renderList(filtered);
        }

        function renderList(data) {
            const container = document.getElementById('listContainer');
            const empty = document.getElementById('emptyState');
            
            if (data.length === 0) {
                container.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            container.innerHTML = data.map(item => `
                <div class="bg-white p-8 rounded-[2rem] border border-slate-100 shadow-sm card-hover flex flex-col justify-between relative overflow-hidden">
                    <div class="relative z-10">
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] font-black text-slate-300 bg-slate-50 px-2 py-1 rounded-lg">#${item['系統id']}</span>
                            <span class="text-xs font-black text-blue-600 bg-blue-50 px-3 py-1.5 rounded-xl uppercase tracking-wider">${item['服務類別']}</span>
                        </div>
                        <h3 class="text-xl font-black text-slate-800 leading-tight mb-4">${item['單位全名']}</h3>
                        <div class="text-slate-500 text-sm leading-relaxed border-t border-slate-50 pt-5">
                            ${item['說明備註'] ? item['說明備註'].replace(/\n/g, '<br>') : '<span class="italic opacity-50">暫無說明資料</span>'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function setupListeners() {
            document.getElementById('searchInput').addEventListener('input', updateView);
        }
    </script>
</body>
</html>
