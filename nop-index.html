<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NPO 單位服務檢索系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Noto+Sans+TC:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans TC', sans-serif; }
        .glass-morphism { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 min-h-screen">

    <nav class="sticky top-0 z-30 glass-morphism border-b border-slate-200 px-4 py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold">N</div>
                <span class="font-bold text-lg tracking-tight">NPO 檢索中心</span>
            </div>
            <div class="text-xs text-slate-400 bg-slate-100 px-2 py-1 rounded">
                自動同步中
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid lg:grid-cols-12 gap-6 mb-8">
            <div class="lg:col-span-4 bg-white p-6 rounded-3xl shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="font-bold text-slate-800">服務類別比例</h3>
                    <span id="dataStatus" class="text-[10px] text-green-500 font-bold bg-green-50 px-2 py-0.5 rounded-full">LIVE</span>
                </div>
                <div class="h-[240px] relative">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>

            <div class="lg:col-span-8 bg-white p-8 rounded-3xl shadow-sm border border-slate-100 flex flex-col justify-center">
                <h2 class="text-2xl font-bold mb-2">想找哪方面的服務？</h2>
                <p class="text-slate-500 mb-6">支援搜尋單位全名、類別或備註內容</p>
                
                <div class="relative group">
                    <input type="text" id="searchInput" 
                        class="w-full bg-slate-50 border-2 border-slate-100 p-5 pl-14 rounded-2xl outline-none focus:border-blue-500 focus:bg-white transition-all text-xl shadow-sm"
                        placeholder="輸入關鍵字，例如：長照、青少年、諮商...">
                    <svg class="w-7 h-7 text-slate-400 absolute left-5 top-5 group-focus-within:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
                
                <div id="filterIndicator" class="mt-4 flex flex-wrap gap-2">
                    </div>
            </div>
        </div>

        <div class="flex justify-between items-center mb-6 px-2">
            <h3 class="font-bold text-lg text-slate-700">單位清單 (<span id="matchCount">0</span>)</h3>
            <div class="flex gap-2">
                <button onclick="sortData('asc')" class="p-2 hover:bg-white rounded-md border text-slate-400"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M3 4h13M3 8h9m-9 4h6m4 0l4-4m0 0l4 4m-4-4v12"></path></svg></button>
            </div>
        </div>

        <div id="loader" class="py-20 text-center text-slate-400 animate-pulse">正在讀取雲端 700 筆資料...</div>
        <div id="listContainer" class="grid md:grid-cols-2 lg:grid-cols-3 gap-5"></div>
        
        <div id="emptyState" class="hidden py-20 text-center bg-white rounded-3xl border-2 border-dashed border-slate-200">
            <div class="text-4xl mb-4">🔍</div>
            <p class="text-slate-500 font-medium">找不到相符的單位</p>
            <button onclick="resetSearch()" class="mt-2 text-blue-600 hover:underline">清除所有過濾條件</button>
        </div>
    </main>

    <script>
        // 設定區
        const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSTGT8qXuH6EljApOaz67UkU6lSWTYF5jTRIFc7NxHw6R5pU-J0o5xW8oHEvB90egZhGBLtJj72BTlE/pub?gid=255315722&single=true&output=csv'; 
        let rawData = [];
        let chart = null;
        const colors = ['#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981', '#64748b'];

        // 初始化
        async function init() {
            Papa.parse(CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: (results) => {
                    rawData = results.data.filter(d => d['單位全名']);
                    document.getElementById('loader').remove();
                    renderAll(rawData);
                    setupListeners();
                }
            });
        }

        function renderAll(data) {
            updateStats(data);
            renderList(data);
            renderChart(data);
        }

        // 列表渲染 (優化版：一次只顯示部分)
        function renderList(data) {
            const container = document.getElementById('listContainer');
            const empty = document.getElementById('emptyState');
            document.getElementById('matchCount').innerText = data.length;

            if (data.length === 0) {
                container.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            // 只渲染前 100 筆確保順暢，700 筆可分段或直接渲染(現代電腦OK)
            container.innerHTML = data.map(item => `
                <div class="group bg-white p-6 rounded-2xl border border-slate-100 shadow-sm hover:shadow-md hover:border-blue-200 transition-all flex flex-col justify-between">
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] font-bold text-slate-400 tracking-widest uppercase bg-slate-50 px-2 py-1 rounded">ID: ${item['系統id']}</span>
                            <span class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded-full">${item['服務類別'] || '未分類'}</span>
                        </div>
                        <h4 class="text-lg font-bold text-slate-800 mb-3 group-hover:text-blue-600 transition-colors">${item['單位全名']}</h4>
                        <div class="text-sm text-slate-500 leading-relaxed line-clamp-4">
                            ${item['說明備註'] ? item['說明備註'].replace(/\n/g, '<br>') : '<span class="italic text-slate-300">暫無說明資訊</span>'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 圖表渲染
        function renderChart(data) {
            const ctx = document.getElementById('categoryChart').getContext('2d');
            const counts = data.reduce((acc, cur) => {
                const cat = cur['服務類別'] || '未分類';
                acc[cat] = (acc[cat] || 0) + 1;
                return acc;
            }, {});

            if (chart) chart.destroy();
            chart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(counts),
                    datasets: [{
                        data: Object.values(counts),
                        backgroundColor: colors,
                        hoverOffset: 10,
                        borderWidth: 4,
                        borderColor: '#ffffff'
                    }]
                },
                options: {
                    maintainAspectRatio: false,
                    cutout: '75%',
                    plugins: { legend: { display: false } },
                    onClick: (e, items) => {
                        if (items.length > 0) {
                            const label = chart.data.labels[items[0].index];
                            applyFilter(label);
                        }
                    }
                }
            });
        }

        // 搜尋邏輯
        function setupListeners() {
            document.getElementById('searchInput').addEventListener('input', (e) => {
                applyFilter(e.target.value);
            });
        }

        function applyFilter(keyword) {
            const input = document.getElementById('searchInput');
            if (input.value !== keyword) input.value = keyword;

            const filtered = rawData.filter(item => 
                Object.values(item).some(val => 
                    String(val).toLowerCase().includes(keyword.toLowerCase())
                )
            );
            renderList(filtered);
            // 搜尋時不重新渲染 Chart，維持全貌感，僅更新列表
        }

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            renderList(rawData);
        }

        function updateStats(data) {
            const tagsContainer = document.getElementById('filterIndicator');
            const topCats = [...new Set(data.map(d => d['服務類別']))].slice(0, 5);
            tagsContainer.innerHTML = `<span class="text-sm text-slate-400 self-center mr-2">快速過濾：</span>` + 
                topCats.map(c => `<button onclick="applyFilter('${c}')" class="text-xs font-medium bg-slate-100 text-slate-600 px-3 py-1.5 rounded-lg hover:bg-blue-100 hover:text-blue-600 transition-colors">${c}</button>`).join('');
        }

        init();
    </script>
</body>
</html>
