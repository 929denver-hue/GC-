<!DOCTYPE html>
<html>
<head>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @media print { .no-print { display: none; } }
    body { font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
    .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
  </style>
</head>
<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const App = () => {
      // 預設數據
      const [data, setData] = useState(Array.from({length:12}, (_,i)=>({month:i+1, countPro:0, countGroup:0, projectIncome:0, year:2026})));
      const [loading, setLoading] = useState(true);
      const [targetYear, setTargetYear] = useState(2026);
      const [projPrice, setProjPrice] = useState(500000);

      // --- 董事會定義參數 ---
      const config = {
        baseYear: 2025,
        baseStaff: 8,          // 2025 基礎人數
        staffAddRate: 2,       // 每年增加 2 人
        avgSalary: 63000,      // 含勞健保月成本
        baseAdmin: 150000,     // 2025 基礎管銷/月
        adminGrowth: 0.10,     // 每年複利成長 10%
        projComm: 0.10,        // 專案佣金 10%
        pricePro: 2500,        // Pro 月費
        priceGroup: 25000      // Group 月費
      };

      // 初始化：抓取雲端資料
      useEffect(() => {
        if (typeof google !== 'undefined') {
          google.script.run.withSuccessHandler(resJson => {
            const res = JSON.parse(resJson);
            if (res.status === "success" && res.rows.length > 0) {
              setData(res.rows.map(r => ({ month:r[0], countPro:r[1], countGroup:r[2], projectIncome:r[3], year:r[4] })));
            }
            setLoading(false);
          }).getCloudData();
        } else {
          setLoading(false);
        }
      }, []);

      // 核心計算邏輯
      const summary = useMemo(() => {
        const yearDiff = targetYear - config.baseYear;
        
        // 1. 人事費用：每年 +2 人 (2025:8, 2026:10, 2027:12...)
        const staffCount = config.baseStaff + (config.staffAddRate * yearDiff);
        const monthlyLabor = staffCount * config.avgSalary;

        // 2. 管銷費用：每年成長 10% (複利)
        const monthlyAdmin = config.baseAdmin * Math.pow((1 + config.adminGrowth), yearDiff);

        const rows = data.map(m => {
          const revSub = (m.countPro * config.pricePro) + (m.countGroup * config.priceGroup);
          const commExp = m.projectIncome * config.projComm;
          const profit = (revSub + m.projectIncome) - (monthlyLabor + monthlyAdmin + commExp);
          return { ...m, revSub, profit };
        });

        const netProfit = rows.reduce((s, r) => s + r.profit, 0);
        // 打平試算：剩餘缺口 / (單一專案單價 * 0.9)
        const projectsNeeded = netProfit < 0 ? Math.ceil(Math.abs(netProfit) / (projPrice * 0.9)) : 0;

        return { rows, netProfit, projectsNeeded, monthlyLabor, monthlyAdmin };
      }, [data, targetYear, projPrice]);

      const handleSave = () => {
        setLoading(true);
        google.script.run.withSuccessHandler(msg => {
          setLoading(false);
          alert(msg);
        }).saveToCloud(JSON.stringify(data));
      };

      if (loading) return <div className="h-screen flex items-center justify-center font-bold text-slate-400 animate-pulse">與雲端 Excel 同步中...</div>;

      return (
        <div className="p-6 md:p-12 max-w-7xl mx-auto">
          <header className="flex justify-between items-center mb-12">
            <div>
              <h1 className="text-4xl font-black text-slate-800 tracking-tighter italic">GC <span className="text-blue-600">STRATEGY</span></h1>
              <div className="flex items-center gap-2 mt-2">
                <span className="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></span>
                <p className="text-xs font-bold text-slate-400 uppercase tracking-widest">董事會決策支援系統</p>
              </div>
            </div>
            <div className="flex gap-4 no-print">
              <select value={targetYear} onChange={e => setTargetYear(+e.target.value)} className="bg-white border-2 border-slate-100 rounded-2xl px-4 py-2 font-bold shadow-sm outline-none">
                {[2025, 2026, 2027, 2028].map(y => <option key={y} value={y}>{y} 年度決策</option>)}
              </select>
              <button onClick={handleSave} className="bg-blue-600 text-white px-8 py-2 rounded-2xl font-bold hover:bg-slate-800 transition-all shadow-xl shadow-blue-100">同步雲端 Excel</button>
            </div>
          </header>

          {/* 數據摘要卡片 */}
          <div className="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
            <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-50">
              <p className="text-xs font-black text-slate-300 uppercase mb-2 tracking-widest">年度預估淨利</p>
              <h2 className={`text-4xl font-black ${summary.netProfit < 0 ? 'text-red-500' : 'text-emerald-500'}`}>
                NT$ {summary.netProfit.toLocaleString()}
              </h2>
            </div>
            <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-50">
              <p className="text-xs font-black text-slate-300 uppercase mb-2 tracking-widest">{targetYear} 人事月成本 (+2人/年)</p>
              <h2 className="text-4xl font-black text-slate-700">NT$ {summary.monthlyLabor.toLocaleString()}</h2>
            </div>
            <div className="bg-white p-8 rounded-[2.5rem] shadow-xl border border-slate-50">
              <p className="text-xs font-black text-slate-300 uppercase mb-2 tracking-widest">{targetYear} 管銷月成本 (+10%/年)</p>
              <h2 className="text-4xl font-black text-slate-700">NT$ {summary.monthlyAdmin.toLocaleString()}</h2>
            </div>
          </div>

          {/* 數據錄入表格 */}
          <div className="bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-slate-100 mb-12">
            <table className="w-full text-left">
              <thead className="bg-slate-50 border-b border-slate-100">
                <tr className="text-[10px] font-black text-slate-400 uppercase tracking-widest">
                  <th className="p-8">月份</th>
                  <th className="p-8 text-blue-600">GC-PRO (家)</th>
                  <th className="p-8 text-indigo-600">GC-GROUP (家)</th>
                  <th className="p-8 text-emerald-600 font-bold">專案/廣告收入</th>
                  <th className="p-8 text-right">當月損益</th>
                </tr>
              </thead>
              <tbody className="divide-y divide-slate-50">
                {data.map((r, i) => (
                  <tr key={i} className="hover:bg-blue-50/30 transition-colors">
                    <td className="p-8 font-black text-slate-300">{r.month}月</td>
                    <td className="p-8"><input type="number" className="w-24 bg-transparent border-b-2 border-slate-100 focus:border-blue-500 outline-none p-1 font-bold transition-all" value={r.countPro} onChange={e => {const n=[...data]; n[i].countPro=+e.target.value; setData(n);}} /></td>
                    <td className="p-8"><input type="number" className="w-24 bg-transparent border-b-2 border-slate-100 focus:border-indigo-500 outline-none p-1 font-bold transition-all" value={r.countGroup} onChange={e => {const n=[...data]; n[i].countGroup=+e.target.value; setData(n);}} /></td>
                    <td className="p-8"><input type="number" className="w-36 bg-transparent border-b-2 border-slate-100 focus:border-emerald-500 outline-none p-1 font-bold text-emerald-600 transition-all" value={r.projectIncome} onChange={e => {const n=[...data]; n[i].projectIncome=+e.target.value; setData(n);}} /></td>
                    <td className={`p-8 text-right font-black ${summary.rows[i].profit < 0 ? 'text-red-300' : 'text-slate-400'}`}>
                      NT$ {summary.rows[i].profit.toLocaleString()}
                    </td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>

          {/* 底部打平試算器 */}
          <div className="bg-slate-900 rounded-[3rem] p-12 text-white flex flex-col md:flex-row justify-between items-center shadow-2xl shadow-blue-900/20">
            <div className="mb-8 md:mb-0">
              <h3 className="text-3xl font-black mb-2 uppercase tracking-tighter">專案打平模擬器</h3>
              <p className="text-slate-400 font-medium">基於當前年度虧損缺口，試算所需補足之專案量</p>
            </div>
            <div className="flex items-center gap-12">
              <div className="text-center">
                <span className="text-[10px] font-black text-blue-400 uppercase block mb-3 tracking-widest">預計專案單價 NT$</span>
                <input type="number" className="bg-slate-800 border-none text-white text-3xl font-black rounded-3xl p-6 w-52 outline-none ring-2 ring-slate-700 focus:ring-blue-500 transition-all" 
                  value={projPrice} onChange={e => setProjPrice(+e.target.value)} />
              </div>
              <div className="text-right border-l border-slate-800 pl-12">
                <span className="text-[10px] font-black text-orange-400 uppercase block mb-3 tracking-widest">尚需承接數量</span>
                <h3 className="text-7xl font-black text-white tracking-tighter">{summary.projectsNeeded} <span className="text-xl text-slate-500">個</span></h3>
              </div>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
