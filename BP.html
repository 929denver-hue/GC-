<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>GC 營運損益與打平分析工具</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const App = () => {
            // 基礎配置
            const [baseConfig, setBaseConfig] = useState({
                pricePro: 2500,       // GC-pro 月費 (假設年費 3 萬 / 12)
                priceGroup: 25000,    // GC-group 月費 (假設年費 30 萬 / 12)
                currentStaff: 8,      // 目前人數
                avgSalary: 63000,     // 平均人均月成本 (含勞健保)
                yearlyStaffAdd: 2,    // 每年預計增加人數
                baseAdminCost: 150000,// 每月基礎管銷 (房租、雜支)
                adminGrowth: 0.10,    // 管銷年增率 10%
                projectCommRate: 0.10 // 專案佣金 10%
            });

            // 每月實際填報數據
            const [monthlyData, setMonthlyData] = useState(
                Array.from({ length: 12 }, (_, i) => ({ 
                    month: i + 1, 
                    countPro: 0, 
                    countGroup: 0, 
                    otherIncome: 0 
                }))
            );

            // 專案打平試算參數
            const [beProjectPrice, setBeProjectPrice] = useState(500000); // 假設一個專案 50 萬

            // 核心計算
            const summary = useMemo(() => {
                const results = monthlyData.map((m, idx) => {
                    // 收入
                    const revSubscription = (m.countPro * baseConfig.pricePro) + (m.countGroup * baseConfig.priceGroup);
                    const revOther = m.otherIncome;
                    const totalRev = revSubscription + revOther;

                    // 支出
                    // 人事費用：基礎 + 每年增員平攤到月份
                    const monthlyStaffAdd = (baseConfig.yearlyStaffAdd / 12) * (idx + 1);
                    const laborCost = (baseConfig.currentStaff + monthlyStaffAdd) * baseConfig.avgSalary;
                    
                    // 管銷費用：基礎 * (1 + 10%)
                    const adminCost = baseConfig.baseAdminCost * (1 + baseConfig.adminGrowth);
                    
                    // 專案佣金支出
                    const commExp = revOther * baseConfig.projectCommRate;

                    const totalExp = laborCost + adminCost + commExp;
                    const profit = totalRev - totalExp;

                    return { ...m, totalRev, totalExp, profit };
                });

                const totalYearRev = results.reduce((s, r) => s + r.totalRev, 0);
                const totalYearExp = results.reduce((s, r) => s + r.totalExp, 0);
                const netProfit = totalYearRev - totalYearExp;
                
                // 打平試算：如果目前虧損，還需要多少專案？
                const gap = netProfit < 0 ? Math.abs(netProfit) : 0;
                const projectNetContribution = beProjectPrice * (1 - baseConfig.projectCommRate);
                const projectsNeeded = gap > 0 ? Math.ceil(gap / projectNetContribution) : 0;

                return { results, totalYearRev, totalYearExp, netProfit, projectsNeeded, gap };
            }, [baseConfig, monthlyData, beProjectPrice]);

            return (
                <div className="p-8 max-w-7xl mx-auto">
                    <header className="mb-8 border-b pb-4 flex justify-between items-end">
                        <div>
                            <h1 className="text-2xl font-bold text-slate-800">GC 營運損益與打平追蹤表</h1>
                            <p className="text-slate-500 text-sm">人事年增 {baseConfig.yearlyStaffAdd} 人 | 管銷年增 {(baseConfig.adminGrowth*100)}% | 專案佣金 {(baseConfig.projectCommRate*100)}%</p>
                        </div>
                        <div className="text-right">
                            <span className="text-sm font-bold text-slate-400 block uppercase">年度預估淨損益</span>
                            <span className={`text-4xl font-black ${summary.netProfit < 0 ? 'text-red-500' : 'text-emerald-600'}`}>
                                NT$ {summary.netProfit.toLocaleString()}
                            </span>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                        {/* 左側：核心成本設定 */}
                        <div className="space-y-6">
                            <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                <h3 className="font-bold mb-4 text-slate-700">營運基準設定</h3>
                                <div className="space-y-3">
                                    <label className="block">
                                        <span className="text-xs text-slate-400">GC-pro 月費</span>
                                        <input type="number" className="w-full border p-2 rounded" value={baseConfig.pricePro} onChange={e => setBaseConfig({...baseConfig, pricePro: +e.target.value})} />
                                    </label>
                                    <label className="block">
                                        <span className="text-xs text-slate-400">GC-group 月費</span>
                                        <input type="number" className="w-full border p-2 rounded" value={baseConfig.priceGroup} onChange={e => setBaseConfig({...baseConfig, priceGroup: +e.target.value})} />
                                    </label>
                                    <label className="block">
                                        <span className="text-xs text-slate-400">當前人數</span>
                                        <input type="number" className="w-full border p-2 rounded" value={baseConfig.currentStaff} onChange={e => setBaseConfig({...baseConfig, currentStaff: +e.target.value})} />
                                    </label>
                                </div>
                            </div>

                            {/* 打平試算器 */}
                            <div className="bg-slate-800 text-white p-6 rounded-xl shadow-lg">
                                <h3 className="font-bold mb-2 text-blue-400 text-lg">專案打平計算機</h3>
                                <p className="text-xs text-slate-400 mb-4">若年度目標虧損，計算需補足的專案量</p>
                                <label className="block mb-4">
                                    <span className="text-xs opacity-60">預計專案單價</span>
                                    <input type="number" className="w-full bg-slate-700 border-none p-2 rounded mt-1 text-white" value={beProjectPrice} onChange={e => setBeProjectPrice(+e.target.value)} />
                                </label>
                                <div className="p-4 bg-slate-700 rounded-lg">
                                    <div className="text-xs opacity-60 uppercase">還需承接專案數</div>
                                    <div className="text-3xl font-black text-orange-400">{summary.projectsNeeded} <span className="text-sm">個</span></div>
                                    <p className="text-[10px] mt-2 text-slate-400 italic">* 已扣除 {baseConfig.projectCommRate*100}% 專案佣金</p>
                                </div>
                            </div>
                        </div>

                        {/* 右側：每月錄入區 */}
                        <div className="lg:col-span-3 bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <table className="w-full text-left">
                                <thead className="bg-slate-50 border-b">
                                    <tr>
                                        <th className="p-4 text-xs font-bold text-slate-400">月份</th>
                                        <th className="p-4 text-xs font-bold text-blue-600">GC-pro (家)</th>
                                        <th className="p-4 text-xs font-bold text-indigo-600">GC-group (家)</th>
                                        <th className="p-4 text-xs font-bold text-emerald-600">專案/廣告收入</th>
                                        <th className="p-4 text-xs font-bold text-slate-700 text-right">當月淨損益</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {summary.rows.map((r, idx) => (
                                        <tr key={idx} className="hover:bg-slate-50">
                                            <td className="p-4 font-bold text-slate-400">{r.month}月</td>
                                            <td className="p-4"><input type="number" className="w-20 border rounded p-1" value={r.countPro} onChange={e => {
                                                const next = [...monthlyData]; next[idx].countPro = +e.target.value; setMonthlyData(next);
                                            }} /></td>
                                            <td className="p-4"><input type="number" className="w-20 border rounded p-1" value={r.countGroup} onChange={e => {
                                                const next = [...monthlyData]; next[idx].countGroup = +e.target.value; setMonthlyData(next);
                                            }} /></td>
                                            <td className="p-4"><input type="number" className="w-32 border rounded p-1" value={r.otherIncome} onChange={e => {
                                                const next = [...monthlyData]; next[idx].otherIncome = +e.target.value; setMonthlyData(next);
                                            }} /></td>
                                            <td className={`p-4 text-right font-bold ${r.profit < 0 ? 'text-red-400' : 'text-slate-600'}`}>
                                                {r.profit.toLocaleString()}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
