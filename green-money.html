<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綠點兌換成長儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
</head>
<body class="bg-gray-50 font-sans border-t-4 border-green-600 min-h-screen">

    <div id="loading-screen" class="min-h-screen flex flex-col items-center justify-center space-y-4">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-500"></div>
        <p class="text-green-700 font-medium animate-pulse">正在從 Google Sheets 同步最新資料與圖表...</p>
    </div>

    <div id="error-screen" class="hidden min-h-screen flex justify-center items-start pt-10">
        <div class="bg-red-50 text-red-700 p-6 rounded-lg border border-red-200 max-w-lg w-full">
            <h3 class="text-lg font-bold flex items-center gap-2">⚠️ 資料連線異常</h3>
            <p id="error-message" class="mt-2 text-sm font-mono break-all"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden max-w-6xl mx-auto p-6 md:p-10">
        <header class="flex flex-col md:flex-row md:justify-between md:items-end mb-8 gap-4">
            <div>
                <h1 class="text-2xl font-extrabold text-green-950">綠點兌換成長儀表板</h1>
                <p id="current-period" class="text-gray-500 mt-1">目前數據期間：載入中...</p>
            </div>
            <div class="text-sm text-green-700 bg-white px-3 py-1.5 rounded-full border border-gray-200 shadow-sm">
                🔄 最後同步：<span id="last-sync"></span>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="kpi-container"></div>

        <div class="mt-8 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                <h3 class="font-bold text-green-700">歷月兌換數據比較</h3>
                <select id="metric-selector" class="border border-gray-200 rounded-lg px-4 py-2 text-sm text-green-800 bg-green-50 focus:outline-none focus:ring-2 focus:ring-green-500 cursor-pointer font-medium">
                    <option value="totalAmount">總兌換金額 (NT$)</option>
                    <option value="txCount">總兌換筆數 (筆)</option>
                    <option value="dailyAvgAmount">每日平均金額 (NT$/日)</option>
                    <option value="dailyAvgTx">每日平均筆數 (筆/日)</option>
                </select>
            </div>
            <div class="relative h-72 w-full">
                <canvas id="trendChart"></canvas>
            </div>
        </div>

        <div class="mt-8 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
            <div class="px-6 py-4 border-b border-gray-100 bg-green-50">
                <h3 class="font-bold text-green-700">近期資料明細</h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-green-700 uppercase bg-white border-b">
                        <tr>
                            <th class="px-6 py-3">期別 (月份)</th>
                            <th class="px-6 py-3 text-right">總金額</th>
                            <th class="px-6 py-3 text-right">總筆數</th>
                            <th class="px-6 py-3 text-right">單筆平均</th>
                            <th class="px-6 py-3 text-right">日均金額</th>
                            <th class="px-6 py-3 text-right">日均筆數</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const SPREADSHEET_ID = '1UfbFi9gS0mpYokTvGgdgmi4ujmSQwz14HG1_i_IcDbU'; 
        const SHEET_NAME = '兌換紀錄';
        const FAST_API_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;

        // 修改：使用原生的 toLocaleString，設定最多顯示兩位小數並自動四捨五入
        const formatNumber = (num) => {
            return Number(num).toLocaleString('en-US', {
                maximumFractionDigits: 2
            });
        };

        // 輔助計算函數：將數字四捨五入至小數點後兩位
        const roundToTwo = (num) => Math.round(num * 100) / 100;

        let myChart = null;
        let globalData = [];

        function generateKpiCardHTML(title, unit, current, previous) {
            const hasPrevious = previous !== undefined && previous !== null;
            let growthRate = 0;
            if (hasPrevious) {
                growthRate = previous === 0 ? 100 : ((current - previous) / previous) * 100;
            }
            const isPositive = growthRate > 0;
            const isNegative = growthRate < 0;
            const trendColor = isPositive ? 'text-green-600' : isNegative ? 'text-red-600' : 'text-gray-500';
            const trendIcon = isPositive ? '↑' : isNegative ? '↓' : '−';

            return `
                <div class="p-5 bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col transition-all hover:shadow-md">
                    <span class="text-green-700 text-sm font-medium">${title}</span>
                    <div class="mt-2 flex items-baseline gap-2">
                        <span class="text-3xl font-bold text-green-950">
                            ${formatNumber(current)} <span class="text-sm font-normal text-gray-500">${unit}</span>
                        </span>
                    </div>
                    ${hasPrevious ? `<div class="mt-3 text-sm font-semibold flex items-center gap-1 bg-gray-50 w-fit px-2 py-1 rounded ${trendColor}">
                        <span>${trendIcon} ${Math.abs(growthRate).toFixed(1)}%</span>
                        <span class="text-gray-400 font-normal text-xs ml-1">vs 上期 (${formatNumber(previous)})</span>
                    </div>` : `<div class="mt-3 text-xs text-gray-400 bg-gray-50 w-fit px-2 py-1 rounded">無上期資料</div>`}
                </div>
            `;
        }

        function renderInteractiveChart(metricKey) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            const metricConfigs = {
                'totalAmount': { label: '總兌換金額 (NT$)', color: '#16a34a' },
                'txCount': { label: '總兌換筆數 (筆)', color: '#16a34a' },
                'dailyAvgAmount': { label: '每日平均金額 (NT$/日)', color: '#16a34a' },
                'dailyAvgTx': { label: '每日平均筆數 (筆/日)', color: '#16a34a' }
            };
            const config = metricConfigs[metricKey];
            const labels = globalData.map(item => item.period);
            const chartData = globalData.map(item => item[metricKey]);

            if (myChart) myChart.destroy();
            Chart.register(ChartDataLabels);

            myChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: config.label,
                        data: chartData,
                        backgroundColor: config.color + 'CC',
                        borderColor: config.color,
                        borderWidth: 1,
                        borderRadius: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: { padding: { top: 30 } },
                    plugins: {
                        legend: { display: false },
                        datalabels: {
                            anchor: 'end',
                            align: 'top',
                            formatter: (value) => formatNumber(value),
                            color: config.color,
                            font: { weight: 'bold', size: 11 }
                        }
                    },
                    scales: {
                        y: { beginAtZero: true, ticks: { callback: (v) => formatNumber(v) } }
                    }
                }
            });
        }

        document.getElementById('metric-selector').addEventListener('change', (e) => renderInteractiveChart(e.target.value));

        async function initDashboard() {
            try {
                const response = await fetch(FAST_API_URL);
                const text = await response.text();
                const jsonString = text.substring(text.indexOf('{'), text.lastIndexOf('}') + 1);
                const rawResult = JSON.parse(jsonString);
                const rows = rawResult.table.rows;

                globalData = rows.map(row => {
                    const getVal = (cell) => cell ? cell.v : null;
                    const periodLabel = String(getVal(row.c[0]) || "");
                    const totalAmount = Number(String(getVal(row.c[1]) || "0").replace(/[^0-9.-]+/g,"")) || 0;
                    const txCount = Number(getVal(row.c[2])) || 0;
                    
                    // 讀取 Excel 第 4 欄 (D 欄) 作為天數
                    const days = Number(getVal(row.c[3])) || 30; 

                    const safeDiv = (num, den) => den === 0 ? 0 : num / den;
                    
                    return {
                        period: periodLabel,
                        totalAmount: totalAmount,
                        txCount: txCount,
                        // 修改：所有平均指標都套用小數點後第二位四捨五入
                        avgTxAmount: roundToTwo(safeDiv(totalAmount, txCount)),
                        dailyAvgAmount: roundToTwo(safeDiv(totalAmount, days)),
                        dailyAvgTx: roundToTwo(safeDiv(txCount, days))
                    };
                }).filter(item => item.totalAmount > 0);

                const currentData = globalData[globalData.length - 1];
                const previousData = globalData.length > 1 ? globalData[globalData.length - 2] : null;

                document.getElementById('current-period').innerText = `目前數據期間：${currentData.period}`;
                document.getElementById('last-sync').innerText = new Date().toLocaleString('zh-TW');

                const kpiContainer = document.getElementById('kpi-container');
                kpiContainer.innerHTML = `
                    ${generateKpiCardHTML('總兌換金額', 'NT$', currentData.totalAmount, previousData?.totalAmount)}
                    ${generateKpiCardHTML('總兌換筆數', '筆', currentData.txCount, previousData?.txCount)}
                    ${generateKpiCardHTML('每日平均金額 (按Excel天數)', 'NT$/日', currentData.dailyAvgAmount, previousData?.dailyAvgAmount)}
                    ${generateKpiCardHTML('每日平均筆數 (按Excel天數)', '筆/日', currentData.dailyAvgTx, previousData?.dailyAvgTx)}
                `;

                document.getElementById('table-body').innerHTML = globalData.map(row => `
                    <tr class="border-b last:border-0 hover:bg-green-50">
                        <td class="px-6 py-4 font-medium text-gray-900">${row.period}</td>
                        <td class="px-6 py-4 text-right font-semibold text-green-700">NT$ ${formatNumber(row.totalAmount)}</td>
                        <td class="px-6 py-4 text-right">${formatNumber(row.txCount)} 筆</td>
                        <td class="px-6 py-4 text-right">NT$ ${formatNumber(row.avgTxAmount)}</td>
                        <td class="px-6 py-4 text-right">NT$ ${formatNumber(row.dailyAvgAmount)}</td>
                        <td class="px-6 py-4 text-right text-green-600">${formatNumber(row.dailyAvgTx)} 筆</td>
                    </tr>
                `).join('');

                renderInteractiveChart('totalAmount');
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');

            } catch (error) {
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('error-screen').classList.remove('hidden');
                document.getElementById('error-message').innerText = error.message;
            }
        }
        window.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
