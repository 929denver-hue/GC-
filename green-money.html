<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>綠點兌換儀表板</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
</head>

<body class="bg-slate-50 font-sans text-slate-800 border-t-4 border-emerald-600 min-h-screen">

    <div id="loading-screen" class="min-h-screen flex flex-col items-center justify-center space-y-4">
        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-emerald-500"></div>
        <p class="text-emerald-700 font-medium animate-pulse">正在從 Google Sheets 同步最新資料與圖表...</p>
    </div>

    <div id="error-screen" class="hidden min-h-screen flex justify-center items-start pt-10 px-6">
        <div class="bg-red-50 text-red-700 p-6 rounded-2xl border border-red-200 max-w-xl w-full shadow-sm">
            <h3 class="text-lg font-bold flex items-center gap-2">資料連線異常</h3>
            <p class="mt-2 text-sm text-red-600">
                請確認 Google Sheets 是否已開放讀取，且期別、總金額、總筆數欄位格式正確。
            </p>
            <p id="error-message" class="mt-3 text-xs font-mono break-all bg-white/70 p-3 rounded-lg border border-red-100"></p>
        </div>
    </div>

    <div id="dashboard" class="hidden max-w-7xl mx-auto p-6 md:p-10">
        <header class="flex flex-col md:flex-row md:justify-between md:items-end mb-8 gap-4">
            <div>
                <div class="inline-flex items-center gap-2 text-xs font-semibold text-emerald-700 bg-emerald-50 border border-emerald-100 rounded-full px-3 py-1 mb-3">
                    Google Sheets 即時同步
                </div>
                <h1 class="text-3xl font-extrabold tracking-tight text-emerald-950">綠點兌換儀表板</h1>
                <p id="current-period" class="text-slate-500 mt-2">目前數據期間：載入中...</p>
            </div>

            <div class="text-sm text-emerald-700 bg-white px-4 py-2 rounded-full border border-slate-200 shadow-sm">
                最後同步：<span id="last-sync" class="font-semibold"></span>
            </div>
        </header>

        <section id="ai-insights-container" class="mb-8 bg-gradient-to-r from-emerald-50 to-green-50 border border-emerald-100 p-6 rounded-2xl shadow-sm">
            <div class="flex flex-col gap-2">
                <h3 class="text-sm font-bold text-emerald-800 uppercase tracking-wider flex items-center gap-2">
                    🎯 自動行銷亮點與決策建議
                </h3>
                <p id="insight-period-note" class="text-xs text-emerald-700"></p>
            </div>

            <ul id="ai-insights-list" class="mt-4 space-y-2 text-sm text-emerald-950 font-medium"></ul>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-5 gap-5" id="kpi-container"></section>

        <section class="mt-8 bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
                <div>
                    <h3 class="font-bold text-emerald-800">歷月兌換數據比較</h3>
                    <p id="chart-description" class="text-xs text-slate-500 mt-1">
                        日均指標會依各月份實際天數換算。
                    </p>
                </div>

                <select id="metric-selector" class="border border-slate-200 rounded-xl px-4 py-2 text-sm text-emerald-800 bg-emerald-50 focus:outline-none focus:ring-2 focus:ring-emerald-500 cursor-pointer font-medium">
                    <option value="totalAmount">總兌換金額</option>
                    <option value="txCount">總兌換筆數</option>
                    <option value="dailyAvgAmount">每日平均金額</option>
                    <option value="dailyAvgTx">每日平均筆數</option>
                </select>
            </div>

            <div class="relative h-80 w-full">
                <canvas id="trendChart"></canvas>
            </div>
        </section>

        <section class="mt-8 bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-100 bg-emerald-50">
                <h3 class="font-bold text-emerald-800">近期資料明細</h3>
                <p class="text-xs text-emerald-700 mt-1">
                    計算天數會依期別自動判斷，讓日均數據更準確。
                </p>
            </div>

            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    <thead class="text-xs text-emerald-700 uppercase bg-white border-b">
                        <tr>
                            <th class="px-6 py-3">期別</th>
                            <th class="px-6 py-3 text-right">計算天數</th>
                            <th class="px-6 py-3 text-right">總金額</th>
                            <th class="px-6 py-3 text-right">總筆數</th>
                            <th class="px-6 py-3 text-right">單筆平均</th>
                            <th class="px-6 py-3 text-right">日均金額</th>
                            <th class="px-6 py-3 text-right">日均筆數</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        const CONFIG = {
            SPREADSHEET_ID: '1UfbFi9gS0mpYokTvGgdgmi4ujmSQwz14HG1_i_IcDbU',
            SHEET_NAME: '兌換紀錄',
            TIME_ZONE: 'Asia/Taipei',

            // true：本月尚未結束時，用「本月至今」天數計算日均。
            // false：本月也用完整月份天數計算，例如 6 月固定用 30 天。
            USE_MONTH_TO_DATE_FOR_CURRENT_MONTH: true
        };

        const FAST_API_URL = `https://docs.google.com/spreadsheets/d/${CONFIG.SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(CONFIG.SHEET_NAME)}`;

        const state = {
            chart: null,
            data: []
        };

        const $ = (id) => document.getElementById(id);

        const METRIC_CONFIGS = {
            totalAmount: {
                label: '總兌換金額',
                prefix: 'NT$ ',
                suffix: '',
                decimals: 0,
                color: '#059669'
            },
            txCount: {
                label: '總兌換筆數',
                prefix: '',
                suffix: ' 筆',
                decimals: 0,
                color: '#047857'
            },
            dailyAvgAmount: {
                label: '每日平均金額',
                prefix: 'NT$ ',
                suffix: '/日',
                decimals: 2,
                color: '#10b981'
            },
            dailyAvgTx: {
                label: '每日平均筆數',
                prefix: '',
                suffix: ' 筆/日',
                decimals: 2,
                color: '#0f766e'
            }
        };

        function formatNumber(value, maximumFractionDigits = 2) {
            const numeric = Number(value);

            return new Intl.NumberFormat('zh-TW', {
                maximumFractionDigits
            }).format(Number.isFinite(numeric) ? numeric : 0);
        }

        function formatMetric(value, config) {
            return `${config.prefix || ''}${formatNumber(value, config.decimals ?? 2)}${config.suffix || ''}`;
        }

        function roundToTwo(value) {
            return Math.round((Number(value) || 0) * 100) / 100;
        }

        function toNumber(value) {
            if (typeof value === 'number') return Number.isFinite(value) ? value : 0;

            const cleaned = String(value ?? '')
                .replace(/,/g, '')
                .replace(/[^0-9.-]/g, '');

            const parsed = Number(cleaned);
            return Number.isFinite(parsed) ? parsed : 0;
        }

        function safeDivide(numerator, denominator) {
            return denominator > 0 ? numerator / denominator : 0;
        }

        function escapeHTML(value) {
            return String(value ?? '').replace(/[&<>'"]/g, (char) => ({
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                "'": '&#39;',
                '"': '&quot;'
            }[char]));
        }

        function getCellDisplay(cell) {
            return cell?.f ?? cell?.v ?? '';
        }

        function getTaipeiDateParts(date = new Date()) {
            const parts = new Intl.DateTimeFormat('en-US', {
                timeZone: CONFIG.TIME_ZONE,
                year: 'numeric',
                month: 'numeric',
                day: 'numeric'
            }).formatToParts(date);

            return parts.reduce((result, part) => {
                if (part.type !== 'literal') result[part.type] = Number(part.value);
                return result;
            }, {});
        }

        function parseGoogleDateLiteral(value) {
            const match = String(value ?? '').match(/^Date\((\d{4}),\s*(\d{1,2})(?:,\s*(\d{1,2}))?/);
            if (!match) return null;

            return {
                year: Number(match[1]),
                month: Number(match[2]) + 1,
                day: match[3] ? Number(match[3]) : 1
            };
        }

        function parseYearMonthFromText(value) {
            const text = String(value ?? '').trim();
            if (!text) return null;

            // 支援：2026/06、2026-06、2026.06、2026年6月
            let match = text.match(/\b(19\d{2}|20\d{2})\s*[\/\.\-年]\s*(0?[1-9]|1[0-2])\s*月?/);
            if (match) {
                return {
                    year: Number(match[1]),
                    month: Number(match[2])
                };
            }

            // 支援：06/2026、6-2026
            match = text.match(/\b(0?[1-9]|1[0-2])\s*[\/\.\-月]\s*(19\d{2}|20\d{2})\b/);
            if (match) {
                return {
                    year: Number(match[2]),
                    month: Number(match[1])
                };
            }

            // 支援台灣常見民國年：113/06、113年6月
            match = text.match(/\b(1\d{2})\s*[\/\.\-年]\s*(0?[1-9]|1[0-2])\s*月?/);
            if (match) {
                return {
                    year: Number(match[1]) + 1911,
                    month: Number(match[2])
                };
            }

            return null;
        }

        function getDaysInMonth(year, month) {
            // month 使用 1 到 12；day = 0 會回到前一個月最後一天。
            return new Date(year, month, 0).getDate();
        }

        function getPeriodInfo(cell, rowIndex) {
            const rawValue = cell?.v ?? '';
            const formattedValue = cell?.f ?? '';

            const parsed = parseGoogleDateLiteral(rawValue)
                || parseYearMonthFromText(formattedValue)
                || parseYearMonthFromText(rawValue);

            if (!parsed) {
                const fallbackLabel = String(formattedValue || rawValue || `第 ${rowIndex + 1} 期`).trim();

                return {
                    label: fallbackLabel,
                    year: null,
                    month: null,
                    monthDays: null,
                    effectiveDays: null,
                    isCurrentMonth: false,
                    sortKey: 999999 + rowIndex
                };
            }

            const today = getTaipeiDateParts();
            const monthDays = getDaysInMonth(parsed.year, parsed.month);
            const isCurrentMonth = parsed.year === today.year && parsed.month === today.month;

            const effectiveDays = CONFIG.USE_MONTH_TO_DATE_FOR_CURRENT_MONTH && isCurrentMonth
                ? Math.min(today.day, monthDays)
                : monthDays;

            return {
                label: `${parsed.year}/${String(parsed.month).padStart(2, '0')}`,
                year: parsed.year,
                month: parsed.month,
                monthDays,
                effectiveDays,
                isCurrentMonth,
                sortKey: parsed.year * 100 + parsed.month
            };
        }

        function parseGoogleVisualizationResponse(responseText) {
            const jsonStart = responseText.indexOf('{');
            const jsonEnd = responseText.lastIndexOf('}');

            if (jsonStart < 0 || jsonEnd < 0) {
                throw new Error('Google Sheets 回傳格式不正確，找不到 JSON 內容。');
            }

            let jsonString = responseText.slice(jsonStart, jsonEnd + 1);

            // Google Visualization API 遇到日期欄位時，可能回傳 new Date(...)，這不是標準 JSON。
            jsonString = jsonString
                .replace(/:\s*new Date\(([^)]*)\)/g, ':"Date($1)"')
                .replace(/:\s*Date\(([^)]*)\)/g, ':"Date($1)"');

            return JSON.parse(jsonString);
        }

        function calculateGrowth(current, previous) {
            if (!Number.isFinite(previous) || previous === 0) return null;
            return ((current - previous) / previous) * 100;
        }

        function generateKpiCardHTML({ title, current, previous, config }) {
            const hasPrevious = previous !== undefined && previous !== null;
            const growthRate = hasPrevious ? calculateGrowth(current, previous) : null;

            const isPositive = growthRate !== null && growthRate > 0;
            const isNegative = growthRate !== null && growthRate < 0;

            const trendColor = isPositive
                ? 'text-emerald-700 bg-emerald-50'
                : isNegative
                    ? 'text-red-700 bg-red-50'
                    : 'text-slate-600 bg-slate-50';

            const trendIcon = isPositive ? '↑' : isNegative ? '↓' : '−';

            let comparisonHTML = `
                <div class="mt-4 text-xs text-slate-400 bg-slate-50 w-fit px-2 py-1 rounded-md">
                    無上期資料
                </div>
            `;

            if (hasPrevious && growthRate === null) {
                comparisonHTML = `
                    <div class="mt-4 text-xs text-slate-500 bg-slate-50 w-fit px-2 py-1 rounded-md">
                        上期為 0，無百分比基準
                    </div>
                `;
            }

            if (hasPrevious && growthRate !== null) {
                comparisonHTML = `
                    <div class="mt-4 text-sm font-semibold flex flex-wrap items-center gap-1 w-fit px-2 py-1 rounded-md ${trendColor}">
                        <span>${trendIcon} ${Math.abs(growthRate).toFixed(1)}%</span>
                        <span class="text-slate-400 font-normal text-xs ml-1">vs 上期：${formatMetric(previous, config)}</span>
                    </div>
                `;
            }

            return `
                <div class="p-5 bg-white rounded-2xl shadow-sm border border-slate-100 flex flex-col transition-all hover:-translate-y-0.5 hover:shadow-md">
                    <span class="text-emerald-700 text-sm font-semibold">${escapeHTML(title)}</span>
                    <div class="mt-2 flex items-end gap-2">
                        <span class="text-3xl font-extrabold tracking-tight text-emerald-950">${formatMetric(current, config)}</span>
                    </div>
                    ${comparisonHTML}
                </div>
            `;
        }

        function generateStaticKpiCardHTML({ title, value, unit, note }) {
            return `
                <div class="p-5 bg-emerald-950 text-white rounded-2xl shadow-sm flex flex-col transition-all hover:-translate-y-0.5 hover:shadow-md">
                    <span class="text-emerald-100 text-sm font-semibold">${escapeHTML(title)}</span>
                    <div class="mt-2 flex items-end gap-2">
                        <span class="text-3xl font-extrabold tracking-tight">${escapeHTML(value)}</span>
                        <span class="mb-1 text-sm text-emerald-100">${escapeHTML(unit)}</span>
                    </div>
                    <div class="mt-4 text-xs text-emerald-100/90 bg-white/10 w-fit px-2 py-1 rounded-md">
                        ${escapeHTML(note)}
                    </div>
                </div>
            `;
        }

        function generateMarketingInsights(current, previous) {
            const insights = [];

            $('insight-period-note').textContent =
                `日均指標以「${current.calculationNote}」計算；歷史月份會自動採用 28 / 29 / 30 / 31 天。`;

            if (previous) {
                const avgChange = calculateGrowth(current.avgTxAmount, previous.avgTxAmount);

                if (avgChange !== null && avgChange > 10) {
                    insights.push(`🔥 <strong>兌換客單價明顯提升：</strong>本期單筆平均兌換額較上期成長 <strong>${avgChange.toFixed(1)}%</strong>，代表用戶更願意集中點數兌換高價值商品。`);
                } else if (avgChange !== null && avgChange < -10) {
                    insights.push(`⚠️ <strong>小額兌換比例提高：</strong>本期單筆平均兌換額較上期下滑 <strong>${Math.abs(avgChange).toFixed(1)}%</strong>，建議觀察是否由即時性、小額通路帶動。`);
                }

                const dailyTxChange = calculateGrowth(current.dailyAvgTx, previous.dailyAvgTx);

                if (dailyTxChange !== null && dailyTxChange > 15) {
                    insights.push(`📈 <strong>日常活躍度上升：</strong>每日平均兌換筆數較上期成長 <strong>${dailyTxChange.toFixed(1)}%</strong>，顯示兌換行為更頻繁。`);
                } else if (dailyTxChange !== null && dailyTxChange < -15) {
                    insights.push(`📉 <strong>兌換頻次轉弱：</strong>每日平均兌換筆數較上期下降 <strong>${Math.abs(dailyTxChange).toFixed(1)}%</strong>，可檢查活動檔期、兌換品項與通路曝光量。`);
                }
            }

            if (current.totalAmount >= 500000) {
                insights.push(`🌿 <strong>兌換規模達高水位：</strong>本期總兌換金額達 <strong>NT$ ${formatNumber(current.totalAmount, 0)}</strong>，可包裝為會員經營或永續行銷成果。`);
            }

            if (!insights.length) {
                insights.push('📊 <strong>整體表現穩定：</strong>本期日均金額、日均筆數與單筆平均未出現明顯異常波動，建議維持現有推廣節奏並持續追蹤下期動能。');
            }

            $('ai-insights-list').innerHTML = insights
                .map((text) => `<li class="leading-6">${text}</li>`)
                .join('');
        }

        function renderKpis(current, previous) {
            $('kpi-container').innerHTML = `
                ${generateKpiCardHTML({
                    title: '總兌換金額',
                    current: current.totalAmount,
                    previous: previous?.totalAmount,
                    config: METRIC_CONFIGS.totalAmount
                })}

                ${generateKpiCardHTML({
                    title: '總兌換筆數',
                    current: current.txCount,
                    previous: previous?.txCount,
                    config: METRIC_CONFIGS.txCount
                })}

                ${generateKpiCardHTML({
                    title: '單筆平均金額',
                    current: current.avgTxAmount,
                    previous: previous?.avgTxAmount,
                    config: {
                        prefix: 'NT$ ',
                        suffix: '',
                        decimals: 2
                    }
                })}

                ${generateKpiCardHTML({
                    title: '每日平均金額',
                    current: current.dailyAvgAmount,
                    previous: previous?.dailyAvgAmount,
                    config: METRIC_CONFIGS.dailyAvgAmount
                })}

                ${generateStaticKpiCardHTML({
                    title: '本期計算天數',
                    value: String(current.effectiveDays),
                    unit: '天',
                    note: current.calculationNote
                })}
            `;
        }

        function renderTable() {
            $('table-body').innerHTML = state.data.map((row) => `
                <tr class="border-b last:border-0 hover:bg-emerald-50/70 transition-colors">
                    <td class="px-6 py-4 font-semibold text-slate-900 whitespace-nowrap">
                        ${escapeHTML(row.period)}
                        ${row.isCurrentMonth ? '<span class="text-xs text-emerald-700 bg-emerald-50 px-2 py-0.5 rounded-full">本月至今</span>' : ''}
                    </td>
                    <td class="px-6 py-4 text-right whitespace-nowrap">
                        <span class="text-xs text-slate-600 bg-slate-100 px-2 py-1 rounded-md">${escapeHTML(row.calculationNote)}</span>
                    </td>
                    <td class="px-6 py-4 text-right font-semibold text-emerald-700 whitespace-nowrap">NT$ ${formatNumber(row.totalAmount, 0)}</td>
                    <td class="px-6 py-4 text-right whitespace-nowrap">${formatNumber(row.txCount, 0)} 筆</td>
                    <td class="px-6 py-4 text-right whitespace-nowrap">NT$ ${formatNumber(row.avgTxAmount, 2)}</td>
                    <td class="px-6 py-4 text-right whitespace-nowrap">NT$ ${formatNumber(row.dailyAvgAmount, 2)}</td>
                    <td class="px-6 py-4 text-right text-emerald-700 font-medium whitespace-nowrap">${formatNumber(row.dailyAvgTx, 2)} 筆</td>
                </tr>
            `).join('');
        }

        function renderInteractiveChart(metricKey) {
            const canvas = $('trendChart');
            const ctx = canvas.getContext('2d');
            const config = METRIC_CONFIGS[metricKey] || METRIC_CONFIGS.totalAmount;

            const labels = state.data.map((item) => item.isCurrentMonth ? `${item.period} 至今` : item.period);
            const chartData = state.data.map((item) => item[metricKey]);

            if (state.chart) state.chart.destroy();

            state.chart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels,
                    datasets: [{
                        label: config.label,
                        data: chartData,
                        backgroundColor: `${config.color}CC`,
                        borderColor: config.color,
                        borderWidth: 1,
                        borderRadius: 8,
                        maxBarThickness: 48
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    layout: {
                        padding: {
                            top: 28,
                            right: 8,
                            left: 8
                        }
                    },
                    plugins: {
                        legend: {
                            display: false
                        },
                        tooltip: {
                            callbacks: {
                                label: (context) => `${config.label}：${formatMetric(context.raw, config)}`,
                                afterLabel: (context) => `計算天數：${state.data[context.dataIndex].calculationNote}`
                            }
                        },
                        datalabels: {
                            display: (context) => context.chart.data.labels.length <= 18,
                            anchor: 'end',
                            align: 'top',
                            formatter: (value) => formatMetric(value, config),
                            color: config.color,
                            font: {
                                weight: '700',
                                size: 11
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: {
                                display: false
                            },
                            ticks: {
                                color: '#475569'
                            }
                        },
                        y: {
                            beginAtZero: true,
                            grid: {
                                color: '#e2e8f0'
                            },
                            ticks: {
                                color: '#475569',
                                callback: (value) => formatNumber(value, config.decimals ?? 2)
                            }
                        }
                    }
                }
            });

            $('chart-description').textContent =
                `目前顯示：${config.label}；日均類指標會依每個月份的實際天數換算。`;
        }

        function normalizeRows(rows) {
            return rows.map((row, index) => {
                const cells = row.c || [];
                const periodInfo = getPeriodInfo(cells[0], index);

                const fallbackDays = toNumber(getCellDisplay(cells[3]));
                const monthDays = periodInfo.monthDays || fallbackDays || 30;
                const effectiveDays = periodInfo.effectiveDays || fallbackDays || 30;

                const totalAmount = toNumber(getCellDisplay(cells[1]));
                const txCount = toNumber(getCellDisplay(cells[2]));

                const calculationNote = periodInfo.isCurrentMonth && CONFIG.USE_MONTH_TO_DATE_FOR_CURRENT_MONTH
                    ? `本月至今 ${effectiveDays} / ${monthDays} 天`
                    : `${monthDays} 天`;

                return {
                    period: periodInfo.label,
                    sortKey: periodInfo.sortKey,
                    monthDays,
                    effectiveDays,
                    calculationNote,
                    isCurrentMonth: periodInfo.isCurrentMonth,
                    totalAmount,
                    txCount,
                    avgTxAmount: roundToTwo(safeDivide(totalAmount, txCount)),
                    dailyAvgAmount: roundToTwo(safeDivide(totalAmount, effectiveDays)),
                    dailyAvgTx: roundToTwo(safeDivide(txCount, effectiveDays))
                };
            })
            .filter((item) => item.totalAmount > 0 || item.txCount > 0)
            .sort((a, b) => a.sortKey - b.sortKey);
        }

        function setLoadingState(isLoading) {
            $('loading-screen').classList.toggle('hidden', !isLoading);
            $('dashboard').classList.toggle('hidden', isLoading);
        }

        function showError(error) {
            $('loading-screen').classList.add('hidden');
            $('dashboard').classList.add('hidden');
            $('error-screen').classList.remove('hidden');
            $('error-message').innerText = error?.message || String(error);
        }

        async function initDashboard() {
            try {
                setLoadingState(true);

                const response = await fetch(`${FAST_API_URL}&_=${Date.now()}`, {
                    cache: 'no-store'
                });

                if (!response.ok) {
                    throw new Error(`Google Sheets 連線失敗：HTTP ${response.status}`);
                }

                const text = await response.text();
                const rawResult = parseGoogleVisualizationResponse(text);
                const rows = rawResult?.table?.rows || [];

                state.data = normalizeRows(rows);

                if (!state.data.length) {
                    throw new Error('沒有可顯示的兌換資料，請確認試算表至少包含期別、總金額、總筆數。');
                }

                const currentData = state.data[state.data.length - 1];
                const previousData = state.data.length > 1 ? state.data[state.data.length - 2] : null;

                $('current-period').innerText =
                    `目前數據期間：${currentData.period}${currentData.isCurrentMonth ? '（本月至今）' : ''}`;

                $('last-sync').innerText = new Intl.DateTimeFormat('zh-TW', {
                    timeZone: CONFIG.TIME_ZONE,
                    year: 'numeric',
                    month: '2-digit',
                    day: '2-digit',
                    hour: '2-digit',
                    minute: '2-digit'
                }).format(new Date());

                generateMarketingInsights(currentData, previousData);
                renderKpis(currentData, previousData);
                renderTable();
                renderInteractiveChart('totalAmount');

                $('metric-selector').addEventListener('change', (event) => {
                    renderInteractiveChart(event.target.value);
                });

                setLoadingState(false);
            } catch (error) {
                showError(error);
            }
        }

        if (window.Chart && window.ChartDataLabels) {
            Chart.register(ChartDataLabels);
        }

        window.addEventListener('DOMContentLoaded', initDashboard);
    </script>
</body>
</html>
