<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GC 贈物網 - 環保集點雲端中心化對帳大盤</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen font-sans relative">

  <div id="login-wall" class="fixed inset-0 bg-slate-900 z-50 flex items-center justify-center p-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl max-w-sm w-full space-y-4 border border-slate-100">
      <div class="text-center space-y-1">
        <span class="text-4xl">🌱</span>
        <h2 class="text-base font-black text-slate-800">GC 環保集點管理網頁後台</h2>
        <p class="text-xs text-slate-400">請輸入內部授權帳密解鎖。</p>
      </div>
      <div class="space-y-3">
        <div><label class="block text-xs font-bold text-slate-500 mb-1">營運帳號</label><input type="text" id="wall-username" class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none"></div>
        <div><label class="block text-xs font-bold text-slate-500 mb-1">管理密碼</label><input type="password" id="wall-password" class="w-full border border-slate-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none" onkeypress="if(event.keyCode==13) verifyLogin()"></div>
        <p id="login-error-msg" class="text-xs text-rose-500 font-semibold hidden">❌ 帳號或密碼錯誤。</p>
        <button onclick="verifyLogin()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-2 rounded-lg text-xs transition-all mt-2 shadow-sm">確認登入解鎖</button>
      </div>
    </div>
  </div>

  <header class="bg-gradient-to-r from-emerald-800 to-teal-900 text-white shadow-md px-6 py-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-lg font-bold">🌱 環保集點雙軌自動化工作台</h1>
        <p class="text-xs text-emerald-100 mt-0.5">GitHub Pages 前端介面 ╳ Apps Script 遠端自動化對帳引擎</p>
      </div>
      <button onclick="triggerGasReconciliation()" id="action-btn" class="bg-white hover:bg-slate-100 text-slate-800 text-xs font-bold px-4 py-2 rounded-lg shadow-sm transition-all">🚀 啟動自動化物流核對</button>
    </div>
  </header>

  <main class="max-w-7xl mx-auto p-6 space-y-6">
    <section class="bg-white p-6 rounded-xl border border-slate-200 shadow-xs">
      <h2 class="text-sm font-bold text-slate-400 uppercase tracking-wider">當月對帳快照狀態</h2>
      <p id="status-text" class="text-slate-500 text-xs mt-2">請將原始 Excel 報表上傳至 Google Drive 指定資料夾，並點擊右上方「啟動自動化物流核對」按鈕。</p>
    </section>

    <section class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <div class="bg-white p-5 rounded-xl border border-emerald-100 shadow-2xs">
        <h3 class="font-bold text-sm text-slate-800">👑 超級 VIP 組 (動態累加且精準去重)</h3>
        <textarea id="output-vip" readonly class="w-full mt-2 border border-slate-200 rounded-lg p-2 font-mono text-xs bg-slate-50 h-24 tracking-wider focus:outline-none" placeholder="等待對帳完成..."></textarea>
      </div>
      <div class="bg-white p-5 rounded-xl border border-blue-100 shadow-2xs">
        <h3 class="font-bold text-sm text-slate-800">🌱 初次兌換新客組</h3>
        <textarea id="output-new" readonly class="w-full mt-2 border border-slate-200 rounded-lg p-2 font-mono text-xs bg-slate-50 h-24 tracking-wider focus:outline-none" placeholder="等待對帳完成..."></textarea>
      </div>
    </section>
  </main>

  <script>
    // 🔥 已成功為您同步替換為您最新發佈的 GAS 網頁應用程式 URL
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwhYVzc9f9vkY3Zau6qntOt3-0qdCxgnKP45Ny1dvIs1gbNCOl8ehIso87k_k4-omNi/exec"; 

    function verifyLogin() {
      const u = document.getElementById('wall-username').value;
      const p = document.getElementById('wall-password').value;
      if (u === 'gc_admin' && p === 'gc2026') { document.getElementById('login-wall').classList.add('hidden'); } 
      else { document.getElementById('login-error-msg').classList.remove('hidden'); }
    }

    function triggerGasReconciliation() {
      const btn = document.getElementById('action-btn');
      const status = document.getElementById('status-text');
      btn.innerText = "⌛ 正在進行物流級精密平帳..."; btn.disabled = true;
      status.innerText = "⌛ 遠端引擎正在讀取 Google Drive 資料夾原始 Excel，執行交易序號唯一鍵核對與陳昶安多筆交易動態聚合加總中...";

      // 透過跨域 Fetch API 遠端發動 Google Apps Script 算力進行核對
      fetch(GAS_WEB_APP_URL)
        .then(res => res.json())
        .then(data => {
          btn.innerText = "🚀 啟動自動化物流核對"; btn.disabled = false;
          status.className = "text-emerald-600 text-xs font-bold mt-2";
          status.innerText = "✅ 平帳成功！陳昶安等大戶的多次兌換已在背景自動加總累計，並刷新 Google 試算表大盤。";
          document.getElementById('output-vip').value = data.vip;
          document.getElementById('output-new').value = data.newCustomer;
        })
        .catch(err => {
          btn.innerText = "🚀 啟動自動化物流核對"; btn.disabled = false;
          status.innerText = "❌ 連線失敗，請檢查 Apps Script 的網路應用程式部署權限是否開啟為『任何人』。";
        });
    }
  </script>
</body>
</html>
