<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GC贈物網-2026第一季物資需求調查</title>
    <style>
        :root { --primary-color: #ff8c00; --bg-color: #f9f9f9; --highlight-bg: #fffcf0; }
        body { font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; background-color: var(--bg-color); padding: 20px; color: #333; line-height: 1.6; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: var(--primary-color); text-align: center; margin-bottom: 10px; font-weight: bold; }
        
        /* 美化說明區塊介面 */
        .intro-box {
            background-color: var(--highlight-bg);
            border-left: 5px solid var(--primary-color);
            padding: 20px 25px;
            border-radius: 0 8px 8px 0;
            margin: 25px 0 35px 0;
            box-shadow: 2px 2px 10px rgba(0,0,0,0.03);
        }
        .intro-text {
            color: #555;
            font-size: 0.95em;
            margin: 0;
            text-align: justify;
        }
        .link-style {
            color: var(--primary-color);
            text-decoration: underline;
            font-weight: bold;
        }

        .section-title { font-size: 1.1em; font-weight: bold; margin: 30px 0 15px; color: #fff; background: var(--primary-color); padding: 10px 15px; border-radius: 6px; }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; font-weight: 600; color: #444; }
        .checkbox-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; }
        .item-card { border: 1px solid #ddd; padding: 12px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; background: #fff; transition: 0.3s; }
        .item-card:hover { border-color: var(--primary-color); background: var(--highlight-bg); }
        .item-card input { margin-right: 12px; }
        .clothes-matrix { background: #fffdf9; border: 1px solid #ffe0b3; padding: 20px; border-radius: 10px; }
        .sub-label { font-size: 0.9em; color: var(--primary-color); margin-bottom: 8px; margin-top: 15px; font-weight: bold; border-left: 3px solid var(--primary-color); padding-left: 8px; }
        input[type="text"], select, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        textarea { height: 100px; resize: vertical; }
        .other-input { margin-top: 10px; display: none; }
        .btn-submit { background: var(--primary-color); color: white; border: none; padding: 16px; width: 100%; border-radius: 30px; font-size: 1.2em; cursor: pointer; margin-top: 20px; font-weight: bold; transition: 0.3s; box-shadow: 0 4px 15px rgba(255,140,0,0.4); }
        .btn-submit:hover { opacity: 0.9; transform: translateY(-2px); }
        .hidden { display: none; }
        #loading { display:none; text-align:center; color: var(--primary-color); font-weight:bold; margin-top:15px; }

        /* 新增連結區塊樣式 */
        .info-links {
            background-color: #f0f7ff;
            border-radius: 8px;
            padding: 15px;
            margin-top: 30px;
            border: 1px solid #d0e3ff;
        }
        .info-links a {
            display: block;
            color: #0066cc;
            text-decoration: none;
            font-size: 0.9em;
            margin-bottom: 8px;
        }
        .info-links a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>2026GC贈物網第一季 物資需求調查表</h2>
    
    <div class="intro-box">
        <p class="intro-text">
            為精準媒合優質資源，邀請您填寫本調查(統計至2026/03/20)。<br>
            <a href="https://drive.google.com/file/d/1D84_h6dns_p03G3Wi-BgmN4D1csmGmVO/view?usp=sharing" target="_blank" class="link-style">「GC代贈」專案</a>，由GC贈物網團隊預先完成進行篩選、分類，確保物資達8成新以上。<br>
            平台支持優質公益單位，贊助GC代贈專案運費，<br>
            依貴單位的需求進行媒合，節省人力負擔，讓愛心資源效益最大化。
        </p>
    </div>

    <form id="surveyForm">
        <div class="section-title">一、單位基本資訊</div>
        <div class="form-group">
            <label>單位全銜*</label>
            <input type="text" name="org_name" required>
        </div>

        <div class="form-group">
            <label>單位服務類型*</label>
            <select name="org_type" onchange="checkOtherType(this, 'other_org_type_div')" required>
                <option value="">請選擇服務類型</option>
                <option value="兒少福利">兒少福利</option>
                <option value="長者服務">長者服務</option>
                <option value="身心障礙">身心障礙</option>
                <option value="弱勢家庭">弱勢家庭</option>
                <option value="婦女服務">婦女服務</option>
                <option value="偏鄉教育">偏鄉</option>
                <option value="動物保護">動物保護</option>
                <option value="其他">其他</option>
            </select>
            <div id="other_org_type_div" class="other-input">
                <input type="text" name="other_org_type_text" placeholder="請註明您的服務類型...">
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
            <div class="form-group">
                <label>聯繫人*</label>
                <input type="text" name="contact" required>
            </div>
            <div class="form-group">
                <label>聯絡電話*</label>
                <input type="text" name="phone" required>
            </div>
        </div>

        <div class="section-title">二、長期物資需求類別(複選)</div>
        <div class="checkbox-grid">
            <label class="item-card"><input type="checkbox" name="needs" value="文具用品"> 文具用品</label>
            <label class="item-card"><input type="checkbox" name="needs" value="民生必需品"> 民生必需品</label>
            <label class="item-card"><input type="checkbox" name="needs" value="食品乾貨"> 食品乾貨</label>
            <label class="item-card"><input type="checkbox" name="needs" value="各類家電"> 各類家電</label>
            <label class="item-card"><input type="checkbox" name="needs" value="數位3C"> 數位 3C 設備</label>
            <label class="item-card"><input type="checkbox" onclick="toggleElement('otherNeedsDiv')"> 其他</label>
        </div>
        <div id="otherNeedsDiv" class="other-input">
            <input type="text" name="other_needs_text" placeholder="請註明其他物資需求...">
        </div>

        <div class="section-title">三、8成新二手衣專案需求?</div>
        <div class="form-group">
            <label>是否有二手衣需求？</label>
            <div style="display:flex; gap:30px; margin-bottom:15px;">
                <label><input type="radio" name="clothes" value="yes" onclick="toggleDisplay('clothesBox', true)"> 有</label>
                <label><input type="radio" name="clothes" value="no" onclick="toggleDisplay('clothesBox', false)" checked> 無</label>
            </div>
        </div>

        <div id="clothesBox" class="hidden clothes-matrix">
            <div class="sub-label">性別需求</div>
            <div class="checkbox-grid">
                <label class="item-card"><input type="checkbox" name="c_sex" value="男"> 男生</label>
                <label class="item-card"><input type="checkbox" name="c_sex" value="女"> 女生</label>
                <label class="item-card"><input type="checkbox" name="c_sex" value="不限"> 不限</label>
            </div>
            <div class="sub-label">年齡/尺寸</div>
            <div class="checkbox-grid">
                <label class="item-card"><input type="checkbox" name="c_age" value="嬰幼兒"> 嬰幼兒</label>
                <label class="item-card"><input type="checkbox" name="c_age" value="兒童"> 兒童</label>
                <label class="item-card"><input type="checkbox" name="c_age" value="青少年"> 青少年</label>
                <label class="item-card"><input type="checkbox" name="c_age" value="成人"> 成人</label>
            </div>
            <div class="sub-label">需求季節</div>
            <div class="checkbox-grid">
                <label class="item-card"><input type="checkbox" name="c_season" value="夏季"> 夏季</label>
                <label class="item-card"><input type="checkbox" name="c_season" value="冬季"> 冬季</label>
                <label class="item-card"><input type="checkbox" name="c_season" value="不限"> 不限</label>
            </div>
            <div class="sub-label">需求數量</div>
            <div class="checkbox-grid">
                <label class="item-card"><input type="radio" name="c_qty" value="50件"> 50件</label>
                <label class="item-card"><input type="radio" name="c_qty" value="100件"> 100件</label>
                <label class="item-card"><input type="radio" name="c_qty" value="200件"> 200件</label>
                <label class="item-card"><input type="radio" name="c_qty" value="其他" onclick="toggleElement('otherQtyDiv')"> 其他</label>
            </div>
            <div id="otherQtyDiv" class="other-input">
                <input type="text" name="other_qty_text" placeholder="請填寫具體數量...">
            </div>
        </div>

        <div class="section-title">四、資源去化管道</div>
        <div class="form-group">
            <label>若物資不全然符合需求，單位處理的方式？(複選)</label>
            <div class="checkbox-grid">
                <label class="item-card"><input type="checkbox" name="channels" value="義賣"> 義賣</label>
                <label class="item-card"><input type="checkbox" name="channels" value="二手小舖"> 二手小舖</label>
                <label class="item-card"><input type="checkbox" name="channels" value="轉贈友團"> 轉贈友團</label>
                <label class="item-card"><input type="checkbox" onclick="toggleElement('otherChannelsDiv')"> 其他</label>
            </div>
            <div id="otherChannelsDiv" class="other-input">
                <input type="text" name="other_channels_text" placeholder="請註明其他管道...">
            </div>
        </div>

        <div class="form-group">
            <label>想跟GC贈物網說說話..</label>
            <textarea name="user_comment" placeholder="歡迎留下您的回饋或建議..."></textarea>
        </div>

        <div class="info-links">
            <a href="https://m.give-circle.com/greenpoint?VNK=e1da0e9e" target="_blank">🎉 GC贈物網x環保署 合作上線！民眾寄取件完成媒合即可累積環保綠點</a>
            <a href="https://npo.give-circle.com/" target="_blank">🔗 GC贈物網公益相關介紹</a>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">確認提交調查表</button>
        <div id="loading">正在提交資料，請稍候...</div>
    </form>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbz8Pzv6XJ0d_OBSqlmKyAlCIrc5pmZ-RW0NODLKSPzQBT6s-KJVey7Lnqc1oaGEz_fN/exec';
    const form = document.getElementById('surveyForm');
    const btn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');

    function checkOtherType(select, targetId) {
        document.getElementById(targetId).style.display = (select.value === '其他') ? 'block' : 'none';
    }
    function toggleDisplay(id, show) {
        document.getElementById(id).style.display = show ? 'block' : 'none';
    }
    function toggleElement(id) {
        const el = document.getElementById(id);
        el.style.display = (el.style.display === 'block') ? 'none' : 'block';
    }

    form.addEventListener('submit', e => {
        e.preventDefault();
        btn.disabled = true;
        btn.style.opacity = '0.5';
        loading.style.display = 'block';

        const rawFormData = new FormData(form);
        const processedData = new URLSearchParams();
        const tempObj = {};

        rawFormData.forEach((value, key) => {
            if (tempObj[key]) {
                tempObj[key] = tempObj[key] + ", " + value;
            } else {
                tempObj[key] = value;
            }
        });

        for (const key in tempObj) {
            processedData.append(key, tempObj[key]);
        }

        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: processedData 
        })
        .then(() => {
            alert('感謝您的填寫！資料將自動同步至 GC贈物網 公益部資料庫。未來有適合資源時，我們將依照此表主動聯繫。');
            btn.disabled = false;
            btn.style.opacity = '1';
            loading.style.display = 'none';
            form.reset();
            document.getElementById('clothesBox').style.display = 'none';
        })
        .catch(error => {
            console.error('Error!', error.message);
            alert('系統忙碌中，請聯繫特助確認。');
            btn.disabled = false;
            btn.style.opacity = '1';
            loading.style.display = 'none';
        });
    });
</script>

</body>
</html>
