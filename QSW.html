<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GC贈物網影響力評估：社工</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 響應式矩陣題：手機版轉卡片 */
        @media (max-width: 767px) {
            .table-container table, .table-container thead, .table-container tbody, .table-container th, .table-container td, .table-container tr { display: block; }
            .table-container thead { display: none; }
            .table-container tr { margin-bottom: 1.5rem; border: 1px solid #e2e8f0; border-radius: 0.5rem; padding: 1rem; background: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.05); transition: all 0.3s ease; }
            .table-container td { display: flex; justify-content: space-between; align-items: center; padding: 0.75rem 0; border-bottom: 1px solid #f1f5f9; }
            .table-container td:last-child { border-bottom: none; }
            .table-container td::before { content: attr(data-label); font-weight: 500; color: #475569; font-size: 0.875rem; }
            .table-container td:first-child { display: block; font-weight: 700; color: #1e293b; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.75rem; margin-bottom: 0.5rem; font-size: 1rem; }
            .table-container td:first-child::before { content: ""; }
        }
        input[type="radio"]:checked { transform: scale(1.2); }
        .matrix-row-selected { background-color: #f0fdf4 !important; border-color: #bbf7d0 !important; transition: all 0.3s; }
        input[type=number]::-webkit-inner-spin-button, input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* 錯誤紅框標示樣式 */
        .error-highlight {
            border: 2px solid #ef4444 !important;
            background-color: #fef2f2 !important;
            border-radius: 0.5rem;
            transition: all 0.3s;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans antialiased pb-32">

    <div class="fixed top-0 left-0 w-full bg-white shadow-sm z-50 border-b border-gray-200">
        <div class="max-w-3xl mx-auto px-4 py-2 flex items-center justify-between">
            <span class="text-xs font-bold text-gray-500">整體作答進度</span>
            <span id="overall-progress-text" class="text-xs font-bold text-indigo-600">0%</span>
        </div>
        <div class="w-full h-1.5 bg-gray-100">
            <div id="overall-progress-bar" class="h-1.5 bg-indigo-500 transition-all duration-500 ease-out" style="width: 0%"></div>
        </div>
    </div>

    <main class="max-w-3xl mx-auto mt-12 md:mt-16 bg-white shadow-md rounded-none md:rounded-lg overflow-hidden" id="main-container">
        <div class="bg-indigo-600 text-white p-6">
            <h1 class="text-2xl font-bold">GC贈物網影響力評估：社工</h1>
            <p class="mt-2 text-indigo-100">您好：<br>請根據您參與GC贈物網的經驗填答以下問題，問卷預計花費您10分鐘寶貴的時間。</p>
            <p class="mt-1 text-sm text-indigo-200"><span class="text-red-400 font-bold">*</span>表示必填問題</p>
        </div>

        <form id="impactForm" class="p-6 space-y-10" novalidate>
            <section>
                <h2 class="text-xl font-bold border-b border-gray-200 pb-2 mb-4">個別面向</h2>
                <p class="text-sm text-gray-500 mb-6">請依據您的主觀感受與認知回答</p>

                <div class="mb-8">
                    <label class="block font-semibold mb-3 text-lg">1. 您參與GC贈物網及社工表揚活動時，是否在下列面向有所收穫？ <span class="text-red-500 font-bold">*</span></label>
                    <div class="table-container overflow-x-auto border-0 md:border border-gray-200 rounded">
                        <table class="w-full text-sm text-left whitespace-nowrap">
                            <thead class="bg-gray-50 border-b hidden md:table-header-group">
                                <tr>
                                    <th class="p-3 w-1/3"></th>
                                    <th class="p-3 text-center">非常顯著</th><th class="p-3 text-center">顯著</th><th class="p-3 text-center">有些</th><th class="p-3 text-center">不認為或不確定</th>
                                </tr>
                            </thead>
                            <tbody id="q1-tbody" class="divide-y divide-gray-200"></tbody>
                        </table>
                    </div>
                </div>

                <div class="mb-8">
                    <label class="block font-semibold mb-3 text-lg">2. 和其他相似的活動相比，您在GC贈物網及社工表揚活動的收穫是否特別？ <span class="text-red-500 font-bold">*</span></label>
                    <div class="table-container overflow-x-auto border-0 md:border border-gray-200 rounded">
                        <table class="w-full text-sm text-left whitespace-nowrap">
                            <thead class="bg-gray-50 border-b hidden md:table-header-group">
                                <tr>
                                    <th class="p-3 w-1/3"></th>
                                    <th class="p-3 text-center">難以取代</th><th class="p-3 text-center">相對較高</th><th class="p-3 text-center">差不多</th><th class="p-3 text-center">不如其他</th>
                                </tr>
                            </thead>
                            <tbody id="q2-tbody" class="divide-y divide-gray-200"></tbody>
                        </table>
                    </div>
                </div>
            </section>

            <section class="bg-indigo-50/50 p-4 rounded-xl" id="points-section-container">
                <h2 class="text-xl font-bold border-b border-gray-200 pb-2 mb-4">價值結構</h2>
                <p class="text-sm text-gray-700 mb-4 bg-white border border-indigo-100 p-3 rounded shadow-sm">
                    根據參與GC贈物網及社工表揚活動的經驗，如果您手上有100點，請依照您認為的價值大小來分配點數給以下四項，四項加總100即可。
                </p>

                <div class="sticky top-10 bg-indigo-50/90 backdrop-blur py-3 z-10 border-b border-indigo-200 mb-6 -mx-4 px-4">
                    <div class="flex justify-between text-sm font-bold mb-1">
                        <span class="text-indigo-900">點數分配進度</span>
                        <span id="point-status" class="text-indigo-600">0 / 100</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2">
                        <div id="point-progress-bar" class="bg-indigo-600 h-2 rounded-full transition-all duration-300" style="width: 0%"></div>
                    </div>
                </div>

                <div class="space-y-4 max-w-sm mx-auto" id="point-inputs">
                    <div class="point-container bg-white p-1 rounded transition-all">
                        <label class="block mb-1 font-semibold text-gray-800">1. 獎品實用與履歷加值<span class="text-red-500 font-bold">*</span></label>
                        <input type="number" name="point_1" min="0" max="100" inputmode="numeric" pattern="[0-9]*" class="point-input w-full border border-gray-300 rounded p-3 text-lg focus:ring-indigo-500 focus:border-indigo-500" required placeholder="請輸入點數" oninput="this.value = Math.abs(this.value)">
                    </div>
                    <div class="point-container bg-white p-1 rounded transition-all">
                        <label class="block mb-1 font-semibold text-gray-800">2. 知能增進<span class="text-red-500 font-bold">*</span></label>
                        <input type="number" name="point_2" min="0" max="100" inputmode="numeric" pattern="[0-9]*" class="point-input w-full border border-gray-300 rounded p-3 text-lg focus:ring-indigo-500 focus:border-indigo-500" required placeholder="請輸入點數" oninput="this.value = Math.abs(this.value)">
                    </div>
                    <div class="point-container bg-white p-1 rounded transition-all">
                        <label class="block mb-1 font-semibold text-gray-800">3. 感性價值<span class="text-red-500 font-bold">*</span></label>
                        <input type="number" name="point_3" min="0" max="100" inputmode="numeric" pattern="[0-9]*" class="point-input w-full border border-gray-300 rounded p-3 text-lg focus:ring-indigo-500 focus:border-indigo-500" required placeholder="請輸入點數" oninput="this.value = Math.abs(this.value)">
                    </div>
                    <div class="point-container bg-white p-1 rounded transition-all">
                        <label class="block mb-1 font-semibold text-gray-800">4. 人際效益<span class="text-red-500 font-bold">*</span></label>
                        <input type="number" name="point_4" min="0" max="100" inputmode="numeric" pattern="[0-9]*" class="point-input w-full border border-gray-300 rounded p-3 text-lg focus:ring-indigo-500 focus:border-indigo-500" required placeholder="請輸入點數" oninput="this.value = Math.abs(this.value)">
                    </div>
                </div>
            </section>

            <section>
                <h2 class="text-xl font-bold border-b border-gray-200 pb-2 mb-4">精進之處</h2>
                <div class="mb-8">
                    <label class="block font-semibold mb-3 text-lg">1. 請問您認為GC贈物網尚可再精進/提升之處？ <span class="text-red-500 font-bold">*</span></label>
                    <div class="table-container overflow-x-auto border-0 md:border border-gray-200 rounded">
                        <table class="w-full text-sm text-left whitespace-nowrap">
                            <thead class="bg-gray-50 border-b hidden md:table-header-group">
                                <tr>
                                    <th class="p-3 w-1/3"></th>
                                    <th class="p-3 text-center">滿意</th><th class="p-3 text-center">無意見</th><th class="p-3 text-center">希望改善</th><th class="p-3 text-center">非常需要改善</th>
                                </tr>
                            </thead>
                            <tbody id="q7-tbody" class="divide-y divide-gray-200"></tbody>
                        </table>
                    </div>
                </div>

                <div class="mb-8">
                    <label class="block font-semibold mb-3">2. 其他意見回饋</label>
                    <textarea name="other_feedback" class="w-full border border-gray-300 rounded p-3 h-24 focus:ring-indigo-500 focus:border-indigo-500" placeholder="您的回答"></textarea>
                </div>
            </section>
        </form>

        <div class="pb-8 pt-4 text-center text-sm text-gray-400 border-t border-gray-100 mx-6">
            這份問卷是在 樹冠影響力投資股份有限公司 中建立
        </div>
    </main>

    <div id="sticky-footer" class="fixed bottom-0 left-0 w-full bg-white border-t border-gray-200 p-4 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)] z-40 flex flex-col md:flex-row justify-between items-center gap-3">
        <div class="text-sm text-center md:text-left w-full md:w-auto">
            <span id="footer-msg" class="text-gray-500 font-medium">請完成所有必填項目與點數分配</span>
        </div>
        <div class="flex gap-4 w-full md:w-auto justify-end">
            <button type="button" class="text-sm font-bold text-gray-400 hover:text-red-500 transition-colors px-2 py-2" onclick="clearForm()">
                清除表單
            </button>
            <button type="submit" form="impactForm" id="submit-btn" class="bg-indigo-600 text-white px-8 py-3 rounded font-bold hover:bg-indigo-700 transition-colors w-full md:w-auto shadow-md">
                送出問卷
            </button>
        </div>
    </div>

    <script>
        const matrixItems1 = ["獎品好又實用", "獲得表揚後履歷加值", "從其他社工同儕的作為中學習許多", "GC贈物網平台會員不時的鼓勵令人感動", "企業贊助的心意令人感動", "政府對社工的表揚令人鼓舞", "媒體的報導令人鼓舞", "表揚活動結識很多志同道合夥伴", "表揚活動結識很多潛在的資源提供方"];
        const labels1 = ["非常顯著", "顯著", "有些", "不認為或不確定"];
        
        const matrixItems3 = ["希望更多地方政府也能響應", "希望增加表揚活動志工分享交流機會", "希望促成更多企業參與", "希望能連結更多媒體參與報導", "希望平台有更明顯的社工故事露出", "活動前後的行政效率"];
        const labels3 = ["滿意", "無意見", "希望改善", "非常需要改善"];

        function generateEnhancedMatrix(tbodyId, items, namePrefix, labels) {
            const tbody = document.getElementById(tbodyId);
            items.forEach((item, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition-colors border-transparent border-2"; 
                tr.dataset.name = `${namePrefix}_${index}`; 
                let tds = `<td class="p-3 font-medium whitespace-normal text-gray-800">${item}</td>`;
                labels.forEach((label) => {
                    tds += `
                        <td class="p-3 text-center" data-label="${label}">
                            <label class="cursor-pointer block w-full h-full flex items-center justify-end md:justify-center">
                                <input type="radio" name="${namePrefix}_${index}" value="${label}" 
                                       class="w-5 h-5 text-indigo-600 focus:ring-indigo-500" 
                                       onchange="highlightRow(this)">
                            </label>
                        </td>`;
                });
                tr.innerHTML = tds;
                tbody.appendChild(tr);
            });
        }

        function highlightRow(input) {
            const tr = input.closest('tr');
            tr.parentElement.querySelectorAll('tr').forEach(r => {
                r.classList.remove('matrix-row-selected');
            });
            tr.classList.remove('error-highlight');
            tr.classList.add('matrix-row-selected');
            document.getElementById('impactForm').dispatchEvent(new Event('change'));
            updateOverallProgress();
        }

        generateEnhancedMatrix('q1-tbody', matrixItems1, 'q1', labels1);
        generateEnhancedMatrix('q2-tbody', matrixItems1, 'q2', ["難以取代", "相對較高", "差不多", "不如其他"]);
        generateEnhancedMatrix('q7-tbody', matrixItems3, 'q7', labels3);

        function calculatePoints() {
            let total = 0;
            document.querySelectorAll('.point-input').forEach(input => { 
                input.closest('.point-container').classList.remove('error-highlight'); 
                const val = parseInt(input.value);
                if (!isNaN(val)) total += val; 
            });
            
            const pBar = document.getElementById('point-progress-bar');
            const pStatus = document.getElementById('point-status');

            pBar.style.width = `${Math.min(total, 100)}%`;
            pStatus.textContent = `${total} / 100`;

            if (total === 100) {
                pBar.className = "bg-green-500 h-2 rounded-full transition-all duration-300";
                pStatus.className = "text-green-600 font-bold";
            } else {
                const isOver = total > 100;
                pBar.className = `${isOver ? 'bg-red-500' : 'bg-indigo-600'} h-2 rounded-full transition-all duration-300`;
                pStatus.className = `${isOver ? 'text-red-500' : 'text-indigo-600'} font-bold`;
            }
            updateOverallProgress();
        }

        document.querySelectorAll('.point-input').forEach(input => {
            input.addEventListener('input', calculatePoints);
        });

        function updateOverallProgress() {
            const totalRequired = 9 + 9 + 4 + 6; 
            let answered = 0;

            ['q1', 'q2'].forEach(prefix => {
                for(let i=0; i<9; i++) if(document.querySelector(`input[name="${prefix}_${i}"]:checked`)) answered++;
            });
            for(let i=0; i<6; i++) if(document.querySelector(`input[name="q7_${i}"]:checked`)) answered++;

            document.querySelectorAll('.point-input').forEach(input => {
                if(input.value !== '' && !isNaN(parseInt(input.value))) answered++;
            });

            const percentage = Math.round((answered / totalRequired) * 100);
            document.getElementById('overall-progress-bar').style.width = `${percentage}%`;
            document.getElementById('overall-progress-text').innerText = `${percentage}%`;
        }

        const form = document.getElementById('impactForm');
        form.addEventListener('change', () => {
            const data = Object.fromEntries(new FormData(form).entries());
            localStorage.setItem('gc_survey_v3', JSON.stringify(data));
        });

        window.addEventListener('DOMContentLoaded', () => {
            const draft = localStorage.getItem('gc_survey_v3');
            if (draft) {
                const data = JSON.parse(draft);
                Object.entries(data).forEach(([key, value]) => {
                    const el = form.elements[key];
                    if (!el) return;
                    if (el.length) { 
                        const target = Array.from(el).find(r => r.value === value);
                        if (target) {
                            target.checked = true;
                            target.closest('tr')?.classList.add('matrix-row-selected');
                        }
                    } else { 
                        el.value = value;
                    }
                });
                calculatePoints();
            }
            updateOverallProgress();
        });

        // 獨立且強化的清除表單功能
        function clearForm() {
            if(confirm('確定要清除所有填寫進度嗎？這將無法復原。')) {
                // 1. 重置表單數值
                form.reset();
                // 2. 清除暫存
                localStorage.removeItem('gc_survey_v3');
                // 3. 移除所有視覺選取與錯誤狀態
                document.querySelectorAll('.matrix-row-selected').forEach(el => el.classList.remove('matrix-row-selected'));
                document.querySelectorAll('.error-highlight').forEach(el => el.classList.remove('error-highlight'));
                // 4. 重新計算點數與進度（歸零）
                calculatePoints();
                updateOverallProgress();
                // 5. 畫面平滑捲回最上方
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        const GOOGLE_APP_URL = 'https://script.google.com/macros/s/AKfycbyN782K3M3RGxCSJu6R02gijd3OW53XUd8V7BLO9hDaZ-akhJmgGr8_gsd3gcs2TiL1EQ/exec'; 

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            document.querySelectorAll('.error-highlight').forEach(el => el.classList.remove('error-highlight'));
            
            let isValid = true;
            let firstInvalidEl = null;

            ['q1', 'q2'].forEach(prefix => {
                for(let i=0; i<9; i++) {
                    if(!document.querySelector(`input[name="${prefix}_${i}"]:checked`)) {
                        isValid = false;
                        const tr = document.querySelector(`tr[data-name="${prefix}_${i}"]`);
                        tr.classList.add('error-highlight');
                        if(!firstInvalidEl) firstInvalidEl = tr;
                    }
                }
            });
            
            for(let i=0; i<6; i++) {
                if(!document.querySelector(`input[name="q7_${i}"]:checked`)) {
                    isValid = false;
                    const tr = document.querySelector(`tr[data-name="q7_${i}"]`);
                    tr.classList.add('error-highlight');
                    if(!firstInvalidEl) firstInvalidEl = tr;
                }
            }

            let totalPoints = 0;
            document.querySelectorAll('.point-input').forEach(input => {
                if(input.value === '') {
                    isValid = false;
                    const container = input.closest('.point-container');
                    container.classList.add('error-highlight');
                    if(!firstInvalidEl) firstInvalidEl = container;
                }
                totalPoints += (parseInt(input.value) || 0);
            });

            if(isValid && totalPoints !== 100) {
                isValid = false;
                const pointsSection = document.getElementById('points-section-container');
                pointsSection.classList.add('error-highlight');
                firstInvalidEl = pointsSection;
                alert(`價值結構的點數加總必須剛好為 100 點！（目前為 ${totalPoints} 點）`);
            }

            if(!isValid) {
                const y = firstInvalidEl.getBoundingClientRect().top + window.scrollY - 80;
                window.scrollTo({ top: y, behavior: 'smooth' });
                return;
            }

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = `
                <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white inline-block" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg> 資料寫入中...`;
            
            const dataObj = Object.fromEntries(new FormData(form).entries());
            dataObj.submit_time = new Date().toLocaleString('zh-TW');

            try {
                const response = await fetch(GOOGLE_APP_URL, {
                    method: 'POST',
                    body: JSON.stringify(dataObj),
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
                });

                const result = await response.json();

                if (result.status === 'success') {
                    localStorage.removeItem('gc_survey_v3');
                    document.getElementById('sticky-footer').style.display = 'none';
                    document.querySelector('.fixed.top-0').style.display = 'none'; 
                    document.getElementById('main-container').innerHTML = `
                        <div class="p-12 text-center bg-white rounded-lg shadow-md mt-8">
                            <div class="text-6xl mb-4">🎉</div>
                            <h2 class="text-3xl font-bold text-indigo-700 mb-4">問卷送出成功！</h2>
                            <p class="text-gray-600 text-lg">非常感謝您的寶貴回饋，這對我們意義重大。</p>
                            <button onclick="location.reload()" class="mt-8 text-indigo-500 hover:text-indigo-700 underline text-sm">返回重新填寫</button>
                        </div>
                    `;
                    window.scrollTo(0, 0);
                } else {
                    throw new Error(result.message || '寫入失敗');
                }
            } catch (error) {
                console.error('送出錯誤:', error);
                alert('伺服器連線異常，但您的進度已保留！\n請檢查網路連線後再次點擊送出。');
                submitBtn.disabled = false;
                submitBtn.textContent = '送出問卷';
            }
        });
    </script>
</body>
</html>
