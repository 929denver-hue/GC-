<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kingston 馬克杯需求申請表</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 min-h-screen py-10 px-4 font-sans text-slate-900">
  <div class="max-w-xl mx-auto bg-white shadow-2xl rounded-2xl overflow-hidden border border-slate-200" id="app-container">
    
    <div id="header-bg" class="p-8 text-white bg-gradient-to-br from-slate-800 to-black">
      <div class="flex justify-between items-center mb-2">
        <span class="text-xs font-bold border border-white/30 px-2 py-1 rounded">GC贈物網 x Kingston</span>
        <span class="text-xs opacity-70 italic">截止時間：4/20 (一) 12:00</span>
      </div>
      <h1 class="text-2xl font-black">Kingston 馬克杯需求申請</h1>
      <p id="header-desc" class="mt-2 text-sm opacity-90 leading-relaxed">
        待物品進倉後，將協助寄出，運費由GC贊助支付。
      </p>
    </div>

    <div id="expired-view" class="hidden p-12 text-center space-y-4">
      <div class="text-5xl">☕</div>
      <h2 class="text-xl font-bold text-slate-800">活動已截止收單</h2>
      <p class="text-slate-500 text-sm">我們會盡快進行統計與分配，後續將透過Line聯繫。感謝參與！</p>
    </div>

    <form id="application-form" class="p-8 space-y-6">
      
      <div class="bg-amber-50 border-l-4 border-amber-400 p-4 rounded-r-lg">
        <h4 class="text-amber-800 font-bold text-sm mb-1">⚠️ 物品情況說明</h4>
        <p class="text-amber-700 text-xs leading-relaxed">
          本物品為全新，但製作過程中杯身產生細微刮痕，<strong>基於衛生安全不建議作為飲具使用</strong>。但杯身設計可愛，非常適合以下用途：
        </p>
      </div>

      <div class="space-y-3">
        <div class="rounded-xl overflow-hidden border border-slate-200 bg-slate-100 flex items-center justify-center min-h-[200px]">
          <img src="https://drive.google.com/thumbnail?id=1IX6CF9yPqacvmJCBLWWZp3mk4bn8NfcB&sz=w1000" alt="馬克杯用途參考" class="w-full h-auto">
        </div>
        <p class="text-[10px] text-slate-400 text-center">用途參考：盆栽、筆筒、擴香收納、小飾品擺放等</p>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div class="space-y-2">
          <label class="block text-sm font-bold text-slate-700">申請人姓名</label>
          <input type="text" id="applicantName" required class="w-full border border-slate-200 rounded-lg p-3 focus:border-slate-800 focus:outline-none">
        </div>
        <div class="space-y-2">
          <label class="block text-sm font-bold text-slate-700">申請單位名稱</label>
          <input type="text" id="organization" required class="w-full border border-slate-200 rounded-lg p-3 focus:border-slate-800 focus:outline-none">
        </div>
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-bold text-slate-700">Line ID <span class="text-xs font-normal text-slate-400">(申請後將透過 Line 聯繫)</span></label>
        <input type="text" id="lineId" required placeholder="請確認 ID 已開啟搜尋或提供連結" class="w-full border border-slate-200 rounded-lg p-3 focus:border-slate-800 focus:outline-none">
      </div>

      <div class="space-y-2">
        <label class="block text-sm font-bold text-slate-700">期望申請數量 (上限100)</label>
        <input type="number" id="quantity" min="1" max="100" value="1" required class="w-full border border-slate-200 rounded-lg p-3 focus:border-slate-800 focus:outline-none font-medium">
      </div>

      <div class="space-y-3">
        <label class="block text-sm font-bold text-slate-700">用途簡述</label>
        <div class="flex flex-wrap gap-2" id="quick-tags">
          <button type="button" class="tag-btn text-[10px] bg-slate-100 text-slate-600 px-2 py-1 rounded-md hover:bg-slate-800 hover:text-white transition-all">+ 筆筒</button>
          <button type="button" class="tag-btn text-[10px] bg-slate-100 text-slate-600 px-2 py-1 rounded-md hover:bg-slate-800 hover:text-white transition-all">+ 盆栽</button>
          <button type="button" class="tag-btn text-[10px] bg-slate-100 text-slate-600 px-2 py-1 rounded-md hover:bg-slate-800 hover:text-white transition-all">+ 擴香</button>
          <button type="button" class="tag-btn text-[10px] bg-slate-100 text-slate-600 px-2 py-1 rounded-md hover:bg-slate-800 hover:text-white transition-all">+ 收納擺飾</button>
        </div>
        <textarea id="purpose" required maxlength="100" placeholder="請描述您的計畫用途..." class="w-full border border-slate-200 rounded-lg p-3 h-28 focus:border-slate-800 focus:outline-none resize-none text-sm"></textarea>
      </div>

      <button type="submit" id="submit-btn" class="w-full bg-slate-900 hover:bg-black text-white font-bold py-4 rounded-xl shadow-lg transform active:scale-[0.98] transition-all disabled:bg-slate-300">
        確認送出申請
      </button>
    </form>
  </div>

  <script>
    // ==========================================
    // ⚠️ 設定區：請填入您的 GAS 部署網址
    // ==========================================
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxR3XL1uf3iPLpZW-ZiosITTYxDlQKQLuXecKXThGtjuj3nSI82DVkoVrQWIHogm73m/exec"; 
    const DEADLINE = new Date('2026-04-20T12:00:00+08:00');

    const form = document.getElementById('application-form');
    const expiredView = document.getElementById('expired-view');
    const headerBg = document.getElementById('header-bg');
    const purposeInput = document.getElementById('purpose');
    const submitBtn = document.getElementById('submit-btn');

    function checkDeadline() {
      if (new Date() > DEADLINE) {
        form.classList.add('hidden');
        expiredView.classList.remove('hidden');
        headerBg.className = "p-8 text-white bg-slate-500 transition-colors duration-500";
        return true;
      }
      return false;
    }

    checkDeadline();
    setInterval(checkDeadline, 60000);

    document.querySelectorAll('.tag-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const tag = e.target.textContent.replace('+ ', '');
        purposeInput.value = purposeInput.value ? `${purposeInput.value}, ${tag}` : tag;
      });
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      if (checkDeadline()) return;
      if (GAS_URL === "YOUR_GAS_URL_HERE") return alert("請先設定 GAS 網址！");

      submitBtn.disabled = true;
      submitBtn.textContent = '傳送中...';

      const payload = {
        applicant: document.getElementById('applicantName').value,
        organization: document.getElementById('organization').value,
        lineId: document.getElementById('lineId').value,
        quantity: parseInt(document.getElementById('quantity').value),
        purpose: purposeInput.value
      };

      try {
        const response = await fetch(GAS_URL, {
          method: "POST",
          redirect: "follow",
          headers: { "Content-Type": "text/plain;charset=utf-8" },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        if (result.status === "success") {
          alert('需求申請已送出！GC後續將透過 Line 與您聯繫。');
          form.reset();
        } else {
          alert('提交錯誤：' + result.message);
        }
      } catch (err) {
        alert('系統繁忙，請稍後再試。');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = '確認送出申請';
      }
    });
  </script>
</body>
</html>
